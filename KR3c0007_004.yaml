body:
  text: 折獄龜鑑卷四宋鄭克撰議罪漢武帝漢景帝時廷尉上囚防年繼母陳殺防年父防年因殺陳依律殺母以大逆論帝疑之武帝時年十二為太子在帝側遂問之對曰夫繼母如母眀不及母緣父之故比之於母今繼母無狀手殺其父則下手之日母恩絶矣宜與殺人同不宜以大逆論見通典不著出處舊集不載按宋文帝時剡縣人黃初妻趙打息載妻王死後遇赦王有父母及息男稱依法徙趙二千里司徒左長史傅隆議曰父子至親分形同氣稱之於載即載之於趙雖云三代合之一體稱雖創巨痛深固無讐祖之義故古人不以父命辭王父命若云稱可殺趙當何以處載父子祖孫互相殘戮懼非先王眀罰臯陶立法之本旨也舊令云殺人父母徙二千里外不施父子祖孫趙當避王期功千里外耳然令云凡流徙者同籍近親欲相隨聼之趙既流移載為人子何得不從載行而稱不行豈名教所許趙雖內愧終身稱亦沉痛沒齒祖孫之義永不得絶事理固然出南史傅亮傳隆其兄也舊集不載夫防年得絶其繼母以父故也稱不得絶其祖母亦以父故也寃痛之情或伸或屈天理存焉法乃因而制之也黃霸王尊附漢宣帝時燕代之間有三男共娶一女而生一子及將分離爭子興訟丞相黃霸斷之曰此非人類當以禽獸處之遂戮三男以子還母舊不著出處按元帝時王尊守槐里令兼行美陽令事美陽女子告假子不孝曰兒常以我為妻詬笞我尊聞之遣吏收捕驗問辭服尊曰律無妻母之法聖人所不忍書此經所謂造獄者也顔師古説歐陽尚書有造獄事謂為常刑外造殺伐之事尊於是出坐廷上取不孝子懸磔著樹使騎吏五人張弓射殺之出漢書本傳舊集不載是亦以禽獸處之也郭躬按事出後漢書郭躬傳原本作鄭躬誤今從史文改正後漢郭躬以郡吏辟公府時有兄弟共殺人者而罪未有所歸眀帝以兄不訓弟故報兄重而減弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝以躬眀法律召入問之躬對章應罰金帝曰章矯詔殺人何謂罰金躬曰法令有故誤章傳命之繆於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢君子不逆詐帝王法天刑不可委曲生意帝稱善遷躬廷尉出後漢書本傳舊集不載按深文峻法務為苛刻者皆委曲生意而然也君子不逆詐蓋惡其末流必至於此耳傳稱躬之典理官也決獄斷刑依於矜恕故世傳法律而子孫至公者一人廷尉七人侯者三人二千石侍中郎將者二十餘人侍御史正監平者甚衆積善之慶不其盛歟髙柔逰肇附魏髙柔為廷尉時獵法甚峻宜陽典農劉龜竊於禁內射兔其功曹張京詣校事言之帝匿京名收龜付獄柔表請告者名帝大怒曰劉龜當死乃敢獵吾禁地送龜廷尉便當考掠何復請告者主名吾豈妄收龜耶柔曰廷尉天下之平也安得以至尊喜怒而毁法乎重復為奏辭指深切帝意寤乃下京名即還訊各當其罪出魏志本傳按法有誣告反考告人所以息姦省訟也安得匿告者名乎柔可謂能執法矣後魏逰肇為廷尉時宣武嘗敕肇有所降恕執而不從曰陛下自能恕之豈可令臣曲筆此亦柔之流亞歟見北史本傳二事舊集並不載惟柔與肇皆詔所指以勵士師者故並著焉庶幾執法之吏不曲筆以縱有罪不毁法以陷無辜而處議合于人心也湯仲堪晉湯仲堪為荆州刺史有桂陽人黃欽生二親久沒詐服衰麻言迎父喪府曹依律棄市仲堪曰原此法意當以二親生存而橫言死沒情理悖逆所不忍言故同於毆詈之科正以大辟之刑欽生徒有誕妄之過耳遂活之舊出晉書本傳按昔人稱郭躬推已以議物捨狀以探情夫推已以議物者恕也捨狀以探情者忠也仲堪亦庶幾焉茍非用法忠恕欽生棄市決矣此皆俗吏所不能者也何承天宋何承天義熙初劉毅鎮姑熟板為行參軍毅嘗出行而鄢陵縣吏陳滿射鳥箭誤中直帥雖不傷處法棄市承天議曰獄貴情斷疑則從輕昔有驚漢文帝乘輿馬者張釋之劾以犯蹕罪止罰金眀其無心於驚馬也故不以乘輿之重加以異制今滿意在射鳥非有心於中人律過誤傷人三嵗刑况不傷乎罰之可也舊出南史本傳按此亦推已議物捨狀探情者也孔深之宋孔深之為尚書比部郎時安陸應城縣人張江陵與妻吳共罵母黃令死黃忿恨自縊已值赦律子賊殺傷毆父母梟首罵詈棄市謀殺夫之父母亦棄市會赦免刑補治江陵罵母母以自裁重於傷毆及詈科則疑輕制惟有打母遇赦猶梟首無詈母致死會赦之科深之議曰夫題里逆心仁者不入名且惡之况乃人事故殺傷呪咀法所不容詈之致盡理無可宥江陵雖遇赦恩固合梟首婦本以義愛非天屬黃之所恨意不在吳原死補治有允正法詔如深之議吳可棄市出南史孔靖傳深之其孫也舊集不載按原本文多脫誤今據南史傳文改正按詈之致死重於歐傷不以赦原於理為允妻若從坐猶或可赦吳實共罵棄市亦當詔所以補議之闕也戴胄唐戴胄為大理少卿時長孫無忌被召不解佩刀入東上閣尚書右僕射封德彛論監門校尉不覺罪當死無忌贖胄曰校尉與無忌罪均臣子於君父不得稱誤法著御湯劑飲食舟船誤不如法皆死陛下録無忌功原之可也若罰無忌殺校尉不可謂刑帝曰法為天下公朕安得阿親戚詔復議德彛固執帝將可胄駁之曰校尉緣無忌以致罪法當輕若皆過誤不當獨死由是與校尉皆免出唐書本傳舊集不載按胄言臣子於君父不得稱誤所以深責無忌也校尉緣無忌以致罪則與無忌罪均而法當輕也既免無忌緣以致罪者豈得不免乎胄之力爭亦忠恕之義也徐有功唐徐有功為司刑丞時有韓紀孝者受徐敬業偽官前已物故推事使顧仲琰奏稱家口合緣坐詔依斷籍沒有功議曰律謀反者斬身亡即無斬法若情狀難捨或勑遣戮尸除非此塗理絶言象緣坐緣因處斬無斬豈合相緣既所緣之人亡則所因之罪減減止徒坐頻會赦恩今日劫斷沒官未知據何條例詔依有功議斷放由是獲免籍沒者凡數百家出唐書本傳史辭太簡今以通典補其未備舊集不載按易言聖人南靣而聼天下是以漢之史官稱髙祖好謀能聼夫聼固人主之職也聼仲琰之奏則數百家被籍沒聼有功之議則數百家免籍沒能於此知取捨亦可謂之眀矣有功之脫禍而成名夫豈偶然哉竇參唐竇參初為奉先尉男子曹芬兄弟𨽻北軍醉暴其妹父救不止恚赴井死參當兄弟重辟衆請候免喪參曰父由子死若以喪延是殺父不坐皆榜殺之出唐書竇參傳按唐制縣令斷決死罪參為奉先尉時殆攝行縣事歟衆請俟免喪者謂其父既赴井死矣而兄弟又坐法死則無人持喪也此蓋北軍之衆屯於奉先故為之請以緩其刑而欲賕中官使獲免耳參駮正其説乃亟決之蓋以此也栁渾唐栁渾相德宗玉工為帝作帶誤毁一銙工不敢聞私市他玉足之及獻帝識不類摘之工人服罪帝怒其欺詔京兆府論死渾曰陛下遽殺之則已若委有司須詳讞乃可於法誤傷乘輿器服罪當杖請論如律由是工不死出唐書栁渾傳按誤傷之法罪止於是若使深文者議之則必坐以罔上不恭之刑矣舜典曰宥過無大玉工非敢為欺者乃誤毁而備償耳實在可宥之科髙防髙防初事周為刑部郎中宿州有民剚刃其妻而妻族受賂紿州言病風狂不語並不考掠以具獄上請大理斷令決杖防覆之云某人病風不語醫工未有驗狀慿何取證便坐杖刑况禁繫旬月豈不呼索飲食再劾其事必見本情周祖深以為然終置於法按折獄之道必先鞫情而後議罪今情猶未盡罪輒先斷於理可乎此蓋受賂欲庇之耳是故防之覆議如此然但請再劾其事不復推究所司則雖疾惡而亦矜頑且慮枝蔓也杜鎬杜鎬侍郎兄仕江南為法官嘗有子毁父畫像為近親所訟者疑其法未能決形於顔色鎬尚幼問知其故輒曰僧道毁天尊佛像可以比也兄甚竒之按荀子言有法者以法行無法者以類舉此以類舉者也若夫黃霸戮三男王尊殺假子蓋舉其事之類耳法不禁禽獸聚麀然人殺禽獸無罪則戮之可也馬宗元馬宗元待制少時父麟毆人被繫守辜而傷者死將抵法宗元推所毆時在限外四刻因訴於郡得原父罪由是知名按辜限計日而日以百刻計之死在限外者不坐毆殺之罪而坐毆傷之罪法無久近之異也雖止四刻亦是限外有司議法自當如此不必因其子訴而後得原也茍為鹵莽或致枉濫則能訴者亦可稱矣馬亮馬亮尚書知潭州屬縣有亡命卒剽攻為鄉村患或謀殺之在法當死者四人亮謂其僚屬曰夫能為民除害而反坐以死豈法意耶乃批其案悉貸之按剽攻之人於法許捕若非名捕者輒以謀殺之則慮有誣枉法所不許也此四人者為民除害其事有實其情可矜而必誅之非法意也然僚屬皆拘法之文則郡將當原法之意故亮獨批其案而悉貸之若奏聼勑裁則尤為得體也王質王質待制知廬州有盜殺其黨并其資而遁邏者得之質抵之死轉運使楊告駮其獄曰盜殺其徒者死當原質曰盜殺其徒而自首者當原今殺人取其資非自首而捕得原死豈法意乎數上疏不報降監舒州靈仙觀逾年韓琦知審刑院請盜殺其徒而不首者母得原已上五事並見本傳按首則原之許自新也不首而原復何謂耶殺其徒取其資遁去捕得初非悔過而貸其死失法意矣宜乎議者有是請也梁適梁適丞相嘗為審刑院詳議官梓州妖人白彥歡能依鬼神作法詛呪人有死者獄上請讞皆以不見傷為疑適曰殺人以刃尚或可拒今以詛也其可免乎卒以重辟論見王圭丞相所撰墓志按能依鬼神作法詛呪是造蓄蠱毒厭魅之類也鞫得其實疑不見傷此蓋不知無法者以類舉之義耳欲決大獄必傅古義彼俗吏者豈能然耶曽公亮曽公亮侍中在政府時每得四方奏獄必躬閲之密州銀沙發民田中有強盜者大理論以死公亮獨謂此禁物也取之雖強與盜民家物有間罪不應死下有司議卒比劫禁物法盜得不死先是金銀所發多以強盜坐死自是無死者見曽肇內翰所撰行狀趙抃趙抃參政初為武安軍節度推官有偽造印者吏皆以為當死抃獨曰造在赦前用在赦後赦前不用赦後不造法皆不死遂以疑讞之卒免死一府皆服見蘇軾端眀所撰墓志按劫禁物造偽印其論以法有不當死而用法者或處死焉是枉濫也則如曽與趙者可謂眀且謹矣昔戴胄參處法意至析秋毫此何愧彼哉陳奉古沈括説二事何承天議一事附陳奉古主客通判貝州時有卒執盜者其母欲前取盜卒拒不與仆之地眀日死以卒屬吏論為棄市奉古議曰主盜有亡失法今人取之法當得捍捍而死乃以鬪論是守者不得主盜也殘一不辜而剽奪生事法非是因以聞報至杖卒人稱服之見王向主簿所撰墓志按古之議罪者先正名分次原情理彼欲前取者被執之盜也母雖親不得輒取也此拒不與者執盜之主也卒雖弱不得輒與也前取之情在於奪不與之情在於捍奪而捍焉其狀似鬪而實非鬪若以鬪論是不正名分不原情理也奉古謂法非是不曰法當得捍乎奈何歸咎於法蓋用法者繆耳沈括內翰説夀州有人殺妻之父母兄弟數口州司以為不道緣坐妻子刑曹駮曰毆妻之父母即是義絶况於謀殺不當復坐其妻邢州有盜殺一家其夫婦即時死有一子眀日乃死州司以其家財産依戶絶法給出嫁親女刑曹駮曰某家父母死時其子尚在財産乃子物所謂出嫁親女乃出嫁姊妹不合有分見筆談夀州之斷失在不原情理也邢州之斷失在不正名分也俗吏用法大率多然法何咎耶不唯今耳古亦有之宋文帝時制劫盜同籍期親補兵餘杭人薄道舉為劫從弟代公道生並大功親以代公等母存為期親而謂子誼隨母補兵尚書左丞何承天議曰婦人三從夫死從子今道舉為劫叔父已沒代公道生並是從弟不合補謫乃以叔母為期親而令二子隨母既乖大功不謫之制又失婦人三從之道謂其母子并宜見原出南史本傳夫不辨男女之異而謫婦人補兵豈非不正名分不原情理之甚者歟此俗吏守文之弊不可不知也胡向胡向少卿初為袁州司理參軍有人竊食而主者擊殺之郡論以死向爭之曰法當杖郡將不聼至請於朝乃如向議見吕大防丞相所撰墓志按此以名分言之則被擊者竊食之盜也擊之者典食之主也以情理言之則與凡人相毆擊異矣登時擊殺罪不至死也然須擊者本無殺意邂逅致死乃坐杖罪或用刃或絶時或殘毁則是意在於殺法所不許也又當原其情理豈可一槩科斷盡心君子亦宜察焉蘇寀侯瑾張唐卿二事附蘇寀給事為大理寺詳斷官時民有父卒母嫁者聞母死已葬乃盜其柩而祔之法當死寀獨曰子盜母柩納於父墓豈與發冢取財者比請之得減死按侯瑾少卿提點陕西刑獄時河中有民父死母改嫁十餘年亦死輒盜發冡取其棺與父合葬法當大辟有司例從輕瑾請著於令此乃用寀所請為例者蓋母與後夫同穴而葬于是發其冢取其柩故論以劫墓見尸之法而請之僅得減死也張唐卿狀元通判陕州時民有母再適人而死者及父之葬子恨母不得祔乃盜喪同葬之有司請論如法唐卿權府事乃曰是知有孝不知有法耳遂釋之以聞則異乎寀所請者蓋後夫尚在而母死未葬獨盜其喪以歸非發冡取棺則法亦輕矣雖釋之可也三事並見本傳陳希亮陳希亮大卿為開封府司録事有青州男子趙宇上言元昊必反坐責為文學參軍福州安置眀年元昊果反宇自訟所部不受亡至京師執政令劾以在官無故亡法希亮奏乞以宇所上封事付有司即其言驗不當加責宇由是得釋見本傳按此論其狀則宇為文學參軍福州安置而亡至京師劾以在官無故亡法可也論其情則宇豈無故亡哉本坐言元昊反而責之今果反矣尚何劾焉希亮可謂能捨狀以探情也賈黯賈黯侍讀判流內銓時益州推官乘澤在蜀三年不知其父死及代還銓吏不為領文書始去發喪既除服且求磨勘黯言澤與父不通問者三年借非匿喪是豈為孝乎卒使坐廢田里見王圭丞相所撰墓志按黯議澤罪若深文者蓋以名教不可不嚴是春秋誅意之義也陳巽陳巽賔客為常州團練推官時案察官有欲重郡獄者曹掾承意舞文成之巽曰非罪殺人以法與殺人以刃無異也竟論如律見本傳按舞文巧詆入人之罪君子不為也而利誘之勢脅之能不失其守者難矣巽豈不謂之賢乎蒲謹密蒲謹密郎中初為萬州南浦令嘗攝幕官時廷尉駮州獄失出死罪謹密以為法者天下共守今罪於法不當死不爭則不可州將曰可與廷尉爭耶謹密愈執不奪及詔下他司議而卒得不入死州將始愧服見曽肇內翰所撰墓志按古人守法如張釋之徐有功皆與天子爭者也而謂不可與廷尉爭繆矣且茍憚我之爭則不恤彼之死豈君子哀矜之義耶強至強至郎中初為泗州司理參軍嘗攝司法事漕運卒盜官米獄具議贓抵死者五人至言議贓未應律州疑其事以奏而大理寺果紏正如至言皆得不死官吏皆被罪獨至不預見曽肇內翰所撰行狀按議贓以律而未應律蓋于意義有不通也罪不應死乃抵死焉則其不講過亦大矣是故漢以律為専門之學唐置博士弟子員以講之盡心君子亦焉可忽夫議罪之事自古甚多今但略舉二十七條亦因舊集槩言之耳其詳見于通典會要不可􅊖載也宥過按此門原本缺標題今補入陳矯魏陳矯為魏郡西部都尉是時耕牛少殺者罪至死曲周民父病以牛禱縣結正棄市矯曰此孝子也表赦之出魏志本傳舊集不載溫恢魏孫禮為司空軍謀掾初喪亂時禮與母相失同郡馬台求得禮母禮推家財盡以與台台後坐法當死禮私導令踰獄乃自首既而台曰臣無逃亡之義徑詣刺姦主簿溫恢嘉之具白太祖各減死一等出魏志孫禮傳舊集不載王承晉王承為東海太守吏録一犯夜人承問何處來云從師家受書還不覺日暮承曰鞭撻寧越以立威名恐非致理之本使吏送令歸家出劉義慶世説舊集不載袁彖南齊袁彖為廬陵王子卿咨議參軍子卿鎮荆州時南郡江陵縣人茍將之按南史袁彖傳作苟蔣之弟胡之婦為曽口寺沙門所淫夜入茍家將之殺沙門為官司所檢將之列家門穢行欲告則恥忍則不可實已所殺胡之列又如此兄弟爭死江陵令啓刺史博議彖曰將之胡之原心非暴辨讞之日義哀行路昔文舉引謗獲漏疏網二子心迹同符古人陷以深刑實傷為善於是兄弟皆得免死出南史袁湛傳彖其族孫也舊集不載按情茍可恕過無大矣孝子之殺牛義士之踰獄兄弟之爭死皆是也如犯夜雖輕罪茍務立威而不原情亦豈能恕之此可為宥過之鑒也韋丹唐韋丹鎮江西有吏掌倉十年數盈五十萬因覆量欠負三千餘石憫之曰久負如此豈皆自取費用必為權勢所須乃令搜索家私文字驗之其分用名歷具在因謂諸吏曰汝等恃權勢以取索於倉吏今其欠負豈獨賠填又將代汝之罪可各據所得限一月納足皆頓首曰君矦以至眀察下凖法合當刑責既釋重罪填納不辭倉吏由是得釋舊不著出處蓋唐人小説所載今新唐書修入丹傳按侵盜官物其入巳其與人罪等耳然入巳之情貪於貨利是君子所疾也與人之情迫於權勢是君子所矜也夫州吏之脅取倉吏之盜與豈不知法但幸其不敗耳以其可矜而宥倉吏則不可獨加州吏罪故并宥焉且欠負賠填既已足矣亦有可恕之道則置而不問者乃許其悔過非縱惡弗治也張詠張詠尚書再知益州先有百姓告論官染院大破色料偷瞞入已禁四十餘人前政不能決詠到慮問謂告事者汝是陳利便人今一料官物合使幾何對曰使若干詠曰甚善可作利便狀來判令今後依所陳利便施行不得有違主典各杖六十餘並放見季畋虞部所撰語録按染院色料乃舊例定額非主典大破雖有寬剩豈為偷瞞但應言上而不言上亦不得無罪爾是故斷杖六十而干連人悉宥之蓋以罪不在彼也吏或苛暴則將劾大破之罪理偷瞞之贓無所不至矣是安知君子宥過之道哉馬亮親事官失金楪一事附馬亮少保初以殿中丞通判常州吏有亡失官物者械繫妻子干連數十百人亮一切縱去許其自償所負不踰月而盡輸之見本傳按宋史本傳載吏民有因緣亡失官錢籍資猶不足償與書中所云異按丁謂丞相説真宗朝因宴有親事官失却金楪一片左右奏云且與決責上曰不可且令尋訪又奏只與決小杖上曰自有尋訪日限若限內尋得只小杖亦不可行也至尊守法尚爾臣子理合如何見丁晉公談録胡則劉承規附胡則侍郎提舉江南路銀銅場鑄錢監得吏所匿銅數萬斤吏懼且死則曰馬伏波哀重囚而縱之亡吾豈重貨而輕數人性命止籍為羡餘按劉承規留後嘗督封禪漕運有鑄錢監工匠訴前後官吏盜銅瘞地僅數千斤承規佯為不納密遣人發取送官不問其罪殆亦有伏波之意歟趙師民趙師民龍學知耀州民有犯鹽鐡禁者乃曰障其利而罪之是罔民也一切不問按此誠仁人之言也然稍寬之斯亦可矣若一切不問則姦猾之民爭出於此顧將奈何君子宥過不當如是姚渙姚渙大卿初監益州交子務時發姦隱幾萬緡主吏皆當死渙請於使者願發其所欺而無及賞典由是得全者衆已上四事並見本傳渙治平二年終于光祿卿李崇袁君正附已見釋寃門按梁袁君正為豫章內史性不信巫郡有萬世榮為巫師君正小疾主簿熊嶽薦之師云須疾者衣為信命君正以所著𥜗與之事訖取𥜗云神將送與北斗君君正使檢諸身於衣裏獲之以為亂政即刑于市而焚其神一郡無敢行巫者出南史袁湛傳君正其族孫也舊集不載是皆惡其妄言惑人故耳情茍可責惡無小矣此之謂也然王制云執左道以亂政殺假鬼神以疑衆殺李崇鞭笞女巫雖亦有意懲惡殆不知王制故未能正法歟折獄龜鑑卷四
