body:
  text: 折獄龜鑑卷五宋鄭克撰懲惡按原本缺門類今補孔琇之王敬則附條按原本此係第二首條缺南齊孔琇之為吳令有小兒年十嵗偷刈鄰家稻一束琇之付獄案罪或諫之答曰十嵗已能為盗長大何所不為縣中皆震出南史孔靖傳琇之靖之孫也舊集不載案南齊王敬則為吳興太守郡舊多剽掠有十數嵗小兒於路拾取遺物敬則殺之以狥自此路不拾遺郡無刼盗出南史本傳舊集不載敬則欲駭衆立威故爾夫小兒無識路有遺物而拾取之非剽掠也何足深罪殺之以狥斯為酷濫是前代長吏專殺之弊也若琇之所按者庶可以懲惡矣李傑曽孝序附唐李傑為河南尹有寡婦告其子不孝傑物色非是謂寡婦曰汝寡居惟一子今告之罪至死得無悔乎婦言子無狀寧復惜傑曰審如此可買棺來取兒尸因使覘其後寡婦出與一道士語曰事了矣俄將棺至傑即令捕道士劾問具服與寡婦通為子所制故欲除之於是杖殺道士納於棺舊出唐書本傳按曽孝序資政知秀州有婦人訟子指鄰人為證孝序視其子頗柔懦而鄰人舉止不律問其母又非親乃責鄰人曰母訟子安用爾為事非渉己因并與其子杖之聞者稱快盖以繼母私鄰人而忌其子間之故致訟見近時小説鄰人與道士類矣然彼教寡婦訟其子以死罪故殺之此教繼母訟其子罪不至死也故杖之而已雖輕重有異其懲惡一也覘婦責鄰二事又見察姦門崔黯唐崔黯鎮湖南有惡少自髠鉗為傭𨽻依託佛教幻惑愚俗積財萬計黯始下車恐其事敗乃持牒詣府云某發願焚修三年今已畢請脱鉗歸俗黯問三年教化所得幾何曰逐旋用不記數又問費用幾何曰三千緡不啻黯曰費者有數納者不記豈無欺隱命捜其室妻孥蓄積甚於俗人既服矯妄即以付法舊不著出處脱鉗事又見察姦門按矯妄幻惑乃妖民也與假鬼神以疑衆執左道以亂政者同矣可不懲歟張輅晉髙祖鎮鄴時魏州冠氏縣華村僧院有鐵佛一軀髙丈餘忽云佛能語以垂教戒徒衆稱贊聞乎鄉縣士庶雲集施利填委髙祖命衙將齎香設供且騐其事虛實張輅請與偕行至則盡遣僧出乃開其房捜得一穴通佛座下即由穴入佛身厲聲以説諸僧過惡衙將遂擒其魁髙祖命就彼戮之舊不著出處入穴事又見察姦門按此亦以矯妄幻惑而戮之也安重榮晉安重榮鎮常山有夫婦共訟其子不孝者重榮面加詰責抽劍令自殺之其父泣言不忍其母詬詈逐之乃繼母也重榮咄出一箭斃之聞者稱快舊不著出處抽劒事又見摘姦門案此事今載五代史安重榮傳按古之後婦疾前妻子亦已多矣苟得其情則切責而嚴戒之可也何必取快一時加之非法乎語曰不教而殺謂之虐重榮固不足道此事亦非所取舊集載之故畧辨焉張詠兵士决杖乞劒一事附張詠尚書淳化五年知益州兼充西川同捉賊招安使時李順初破餘黨猶盛因責决一吏輙枝詞不伏詠曰這的莫要劍喫吏云决不得喫劍則得詠令牽出斬之以狥軍吏􅌓眙相顧自是俱服詠之威信令出必行見張忠定公語録按詠始下車人情觀望於斯時也吏因責决枝詞不伏姦猾甚矣能以威信折猾吏姦則令無不行衆無不服是故卒能平定蜀地也丁謂丞相說真宗朝有兵士作過於法合死特貸命於横門决脊杖二十除配不伏决杖呌喚乞劍把捉不得遂奏取進止傳宣云須决却杖二十後别取處分㝷决訖再取㫖真宗云只是怕喫棒後如此即以决了便送配所更不須問見丁晉公談錄盖彼猾吏枝詞不伏豈只是怕喫棒意謂書生畏懦不敢容易斬人故以此嘗試詠耳兵士之情既與彼異且朝廷威令行乎四海不待斬此卒而後立焉則置不復問可也夫懲惡者體兹矜謹之意安有枉濫之咎乎馬亮馬亮尚書知饒州有土豪白氏多持吏短長嘗殺人以赦免而愈驁横為閭里患亮發其姦而誅之部中畏懾見本傳按亮提㸃福建刑獄時覆訊寃獄全活數十人其誅姦豪必無枉濫盖以懲惡當如是也薛顔薛元賞附薛顔大卿知耀州有豪姓李甲者結客數十人號沒命社或不如意則推一人以死鬬數年為鄉人患莫敢發之顔至大索其黨㑹赦當免特杖甲流海上餘悉籍於軍見本傳按唐薛元賞為京兆尹都市多惡少年以黛墨鑱膚夸詭力剽奪坊閭元賞到府三日収惡少杖死三十餘軰陳諸都市餘黨懼悉以火滅其文出唐書本傳盖懲惡如此者省獄訟之術也顔之籍社頗相類矣楊告田瑜附楊告諌議初為洪州豐城簿邑有賊殺人投尸於江里中人雖知主名而畏不敢言告聞親徃擒之㑹赦原殺人原赦盖乾興初登極赦也有言賊欲報怨者告不為之動既而果乘夜來刺告復捕得之卒寘於法境内肅然按田瑜龍學知青州時城中有殺人投尸井中者吏以無主名而不以聞瑜亷得之曰豈有姦盗殺人而縱之耶厚以金帛募人告捕後數日果於鄰郡獲賊是亦能懲惡者也然郡將為此比之主簿則差易矣李若谷李若谷參政知潭州時有盗上下洞庭間邀刼舟船殺人即投於湖中没其尸及捕獲輙䝉讞得减死黥配他州既而逃歸為患滋甚若谷潛使人擒到條前後殺人狀磔於市按書曰怙終賊刑謂怙其姦慝終不悛改以賊害人當刑殺之此先王懲惡之義也告之捕寘於法若谷之擒磔於市傅諸古義亦庶幾焉劉湜劉湜待制初知耀州富平縣有盗掠人子女者既擒獲輙詐死伺間即逸去再捕得復詐死湜趣令焚之已上四事並見本傳按因其詐死遂以為實而即埋之亦足以折姦而懲惡矣何必焚之耶將慮其徒或能掘取而復活耶掠人子女之罪於法不至戮尸不為焚尸事可也吕公綽吕公綽侍讀知開封府時虎翼卒劉慶告變下吏案驗乃慶始謀衆不從反訴以誣衆且覬幸得賞公綽言京師衛兵多若使姦人得計則無以安衆心卒論慶法外見王珪丞相所撰墓志孫沔孫沔副樞知杭州有匄者左臂無一手右臂唯兩指盗細民鑊相競至庭匄者舉臂泣曰細民誣我無指之人豈能盗鑊沔即然之叱細民出撫勞匄者因與其鑊始弗能受再三安慰匄者不知其計也以指撮鑊徐以臂舉戴於首而去沔追還斷其指令於市見近時小說按懲惡之事本非中道不得已而為之論卒法外者謂不如是無以安衆心也事體所繋大矣則其為此驚讋羣姦於理或可也匄者盗鑊事極微末譎得其情法外刑之亦何忍哉此世俗所誇以為嚴明而君子不取者也特著其事且辨其義庶懲惡得以鑒焉吳中復吳中復龍學知江寧府時屬郡郵兵苦巡轄者苛刻輙共拘縳鞭之及獄具乃不應死中復以便宜戮其首惡餘悉配流奏著於令見本傳按是時廂軍無階級法故不應死中復帶本路兵馬鈐轄故以便宜戮之夫宥過者或縱捨於法中懲惡者或誅戮於法外所以異乎議罪者彼其處决有所推本若輕若重無非法也今法不應死以便宜戮之豈非誅於法外乎彭思永彭思永中丞嘗為益州路轉運使成都闕守攝領府事吏盗官錢數百萬付獄已三嵗出入自若思永視事一日即具獄見本傳按思永疾吏庇姦則固善矣然其為轉運使亦可劾吏正法也乃必待攝領府事而後一日具獄何哉此唯通判為之乃可稱耳在於監司不足道也但其懲惡亦有取焉故特著之周沆周沆侍郎嘗知渤海縣濵州大吏恃府勢築室障民居害其出入民訴縣以十數前令莫敢直沆立表撤室収吏抵罪豪猾惕息見司馬光丞相所撰神道碑薛儀薛儀殿丞通判渭州守將五人不能謹亷大吏郝正把其陰事招權受賂人莫敢詰儀請治之將内窘以情告儀曰止欲去惡吏必不使及君將即移疾儀攝州事乃發正私出塞市馬収案伏法將不染於辭深徳之見司馬光丞相所撰墓誌按君子之懲惡不必皆於法外誅戮也若豪猾之人恣為姦利莫敢治之以法而獨以法繩之亦足以懲惡矣故著此二事使折獄者以為鑒也察姦案原本缺門類今補子産莊遵韓滉張詠郭申錫四事附鄭子産聞婦人哭使執而問之果手刅其夫者或問何以知之子産曰夫人之於所親也有病則憂臨死則懼既死則哀今其夫已死不哀而懼是以知其有姦也舊出獨異志按疑獄集又載兩事莊遵為揚州刺史曽巡行部内忽聞哭聲懼而不哀駐車問之答曰夫遭火燒死遵令吏守其尸乃有蠅集於首披髻視之得鐵釘焉因知此婦與人共殺其夫也韓滉在潤州宴於萬嵗樓忽聞哭聲懼而不哀問左右在何所對曰在某街即命捕之乃婦䘮夫也信宿獄不成吏懼守於尸側有青蠅集其首因發髻視之腦有大釘果婦私鄰人醉其夫而釘殺之也二事舊不著出處近時小説亦載一事張詠尚書鎮蜀日因出過委老聞人哭懼而不哀亟使訊之云夫暴卒乃付吏窮治吏徃熟視畧不見其要害而妻教吏捜頂髪當有驗及徃視之果有大釘䧟其腦中吏喜輙矜妻能悉以告詠詠使呼出厚加賞勞問所知之由令併鞫其事盖嘗害夫亦用此謀發棺視尸其釘尚在遂與哭婦俱刑於市此三事始末畧同皆用子産語以察姦者也或疑張韓之事後人𫝊㑹為之然則上虞孟嘗臨淄曹攄所論孝婦亦可疑矣古今雖殊事理無異適然相似何足致詰當知子産言猶可用郭申錫給事初為常州晉陵尉民有號泣訴其弟為人所殺者申錫察其色懼而不哀曰吾得賊矣執而訊之果兄殺弟見本傳此其事異而理不異豈非亦用子産之言以察姦乎盖言茍中理無時不騐非若譎詐忌人窺測已陳芻狗用輙為祟也王者發政必占古語盡心君子焉可忽哉趙廣漢漢趙廣漢為潁川太守吏俗朋黨廣漢患之厲使其中可用者受記出有案問既得罪名行法罰之廣漢故漏泄其語令相怨咎又教吏為缿筩及得投書削去主名而託以為豪桀大姓子弟所言其後强宗大族家家結為仇讎姦黨散落風俗大改吏民相告訐廣漢得以為耳目盗賊以故不發發又輙得一切治理威名流聞出漢書本傳舊集不載按吏俗朋黨壅蔽為姦則太守勢孤而為衆所制矣是故廣漢以受記案問投書告訐之事破壞其黨使之散落然後用為耳目督察盗賊而皆畏戢乃可治理察姦之術有在是者故特著之也尹翁歸趙廣漢江文遥黄覇三事附漢尹翁歸為東海太守郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聼其政有急名則少緩之按名字原本誤作召披籍上原本脫輙字皆據本傳校正吏民少解輙披籍縣縣収取黠吏豪民案致其罪髙至於死収取人必於秋冬課吏大㑹中及出行縣按中字原本脫去亦據本傳改不以無事時有所取也以一警百吏民皆服恐懼改行自新出漢書本傳舊集不載按趙廣漢使吏民相告訐乃得以為耳目翁歸所以盡知吏民賢不肖及姦邪罪名者何也傳稱廣漢為人强力天性精於吏職見吏民或不寢至旦尤善為鈎距以得事情郡中盗賊閭里輕俠其根株窟穴所在及吏受取請求銖兩之姦皆知之則用為耳目者不獨相告訐之吏民也後魏江文遥為咸陽太守勤於禮接終日坐􅆹事至者見之假以恩顔屏人密問於是民所疾苦大盗姓名姦猾吏長無不知悉亦以精强之力鈎距之術而得人皆為其耳目也是故史言黄覇在潁川時吏民見者語次㝷繹問他陰伏以相參考人咸畏服稱為神明翁歸所以能盡知者殆亦然歟盖以已耳目察姦不若以衆耳目察姦之廣且盡也苐恐為彼所欺耳故於精强鈎距亦有取焉若翁歸之可取者則不獨此也仲尼之言曰政寛則民慢慢則糾之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和翁歸之政近之矣有急名則少緩之者寛以濟猛之謂也吏民少解輙披籍案罪者猛以濟寛之謂也又不以無事時有所取必因課吏大㑹及出行縣則其用猛可謂謹重矣雖盡知姦邪罪名而不盡案致其罪但以一警百而吏民皆服則其用寛可謂簡嚴矣是故能使人人恐懼改行自新和可知也察姦之道莫善於此若夫苛察細事駭伏衆人以矜其明者於翁歸何足道哉擬諸古之良吏其鄭子産之流亞歟吏稱薛宣為世吏師宣特一世之吏師耳翁歸乃百世之吏師也黄昌後漢黄昌為宛令政尚嚴猛好發姦伏有盗其車盖者昌初無所言後乃密遣親客至門下賊曹家掩取得之悉収其家一時殺戮大姓戰懼皆稱神明出後漢書本傳舊集不載按賊曹主盗賊事而盗令君車盖正如周䊸為召陵侯相廷椽憚其嚴明欲損其威而晨取死人斷手足立寺門是姦猾之吏與令為戯者也有以勝之則其黨皆畏戢無以勝之則其黨皆侮玩故昌初無所言猶兵法初如處女敵人開戶也掩取得之猶兵法後如脱敵不及拒也此其所以勝姦之術也夫一車盖亦何所直嘗試縣令人必非逺察其情狀猶渉疑似驗其物色遂見端的於是掩取理無不得也昌發姦伏可謂有術然悉収其家一時殺戮則殘酷已甚矣此乃前代長吏法許專誅之過也今但取其察姦之術耳酷吏之事善人所惡何足道哉馮緄劉文裕附後漢馮緄父煥為幽州刺史疾忌姦惡數致其罪怨者乃詐作璽書譴責煥賜以歐刀又下遼東都尉龎奮使速行刑奮即収煥煥欲自殺緄疑詔文有異止煥曰大人在州志欲去惡實無他故必是凶人妄詐規肆姦毒願以事自上甘罪無晩煥從其言上書自訟果詐者所為追奮抵罪緄由是知名出後漢書本傳舊集不載按劉文裕觀察太平興國三年領秦隴徼廵㑹李飛雄偽乘傳矯制執縳韋韜周承瑨田仁昭王侁梁崇贊馬知節洎文裕等數軰將以逗撓戮於秦川因刼守卒據城叛文裕與語覺其詐乃與仁昭等擒飛雄具狀以聞獄成誅之夷其三族見本傳文裕察姦與緄類矣盖見語言有異而覺其詐也茍攸孟表附魏荀攸少孤祖父廣陵太守曇卒故吏張權求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將有姦衢寤乃推問權果殺人亡命出魏志本傳舊集不載按後魏孟表鎮渦陽南齊遣裴叔業攻圍六十餘日表撫循將士戮力固守初有一南人自云姓邉字叔珍携妻息從夀春投表未及送闕㑹叔業圍城表後察叔珍言色頗有異即推覈乃是叔業姑兒規為内應所携妻息並亦假妄遂斬之人情乃安出北史本傳舊集不載夫察姦者或專以其色察之或兼以其言察之其色非常其言有異必姦詐也但不可逆疑之耳見其有異見其非常然後案之未有不得其情者茍逆疑之則與意其鄰之子竊鈇者類矣是故逆詐示明者不得為善察姦也薛胄隋薛胄為兖州刺史有陳州人向道力偽作髙平郡守將之官胄遇諸塗察其有異將留詰之司馬王君馥固諫乃聼詣郡既而悔之即遣主簿追道力部人徐俱羅嘗任海陵郡守先是已為道力偽代之比至秩滿公私不悟俱羅語君馥云向道力經代為郡豈容疑之君馥又以俱羅所陳固請胄呵之乃止遂収之道力懼而引偽時稱神明出北史薛辦傳胄其四世孫也舊集不載按北史作薛辯又其事並見隋書薛胄本傳按徐倶羅王君馥皆不覺道力有異而胄獨能察之斯可謂明矣明茍不足豈能察姦然不可妄以逆詐為明也李至逺包拯附唐李至逺為天官侍郎知選事疾令史受賄謝多所黜易吏肅然歛手有王忠者被放吏繆書其姓為士欲擬訖增成之至逺曰調者三萬無士姓此必王忠也吏叩頭服罪出唐書李素立傳至逺其孫也舊集不載按善察姦者吏不能欺至逺是也雖然小人為姦亦頗難防包拯副樞知開封府號為嚴明有民犯法罪當杖脊吏受賕與之約曰今見尹必付我責狀汝苐號呼自辨我與汝分罪汝决杖我亦决杖既而拯引囚問畢果付吏責狀囚如吏言分辨不已吏大聲訶之曰但受脊杖出去何用多言拯謂其招權捽吏於庭杖之十七特寛囚罪止從杖坐以折吏勢不知乃為所責卒如素約見筆談此盖防其招權不防其見賣也大抵察姦不可有意吏果招權杖之可矣矯枉過正遂寛囚罪為彼窺測以至見賣失在有意折吏之勢也然則善察姦者可不鑒於此哉李傑葛源曽孝序二事附巳見懲惡門按葛源郎中為吉水令時有毛氏寡婦告其子不孝源以恩義喻之不聼使人微捕得與間語者驗其對乃書寡婦告狀者也鞫之具服為私謀誣其子此乃用李傑覘婦之術也見王安石丞相所撰墓誌曽孝序杖鄰人事亦見懲惡門盖以寡婦指鄰人為證既在訟庭事可立决故不待覘而知之若其能察姦則與源無異也葛源騐對事又見覈姦門裴均河間婦人一事附唐裴均鎮襄陽部民之妻與其鄰通託疾謂夫曰毉者言食獵犬肉即差夫曰吾家無犬柰何妻曰東鄰犬常來可繋而屠之夫用其言以肉餉妻鄰人遂訟於官収捕鞫問立承且云妻所欲也均曰此乃妻有外情躓夫於禍耳追劾之果然妻及姦者皆服罪而釋其夫舊不著出處按柳宗元説河間淫婦託疾令其夫夜召鬼解除即使人告其夜祠呪詛不道吏訊驗笞殺之與屠犬者類矣均能察其姦斯亦可稱也崔黯巳見懲惡門張保雍王晦叔附張保雍刑部知漢州四卒夜叩府告禁兵兩營變佐吏駭懼保雍徐出械四卒掠之趣作誣狀狥兩營至明鞫得實乃四卒與伍中謀幸授己甲因白以叛遂及同謀者九人棄之市見曽鞏舍人所撰神道碑按保雍所以察其為姦者軍若已變則告者何獨四卒軍若未變則何用夜叩府告其械而掠之趣作誣狀者盖慮軍情因此不安欲狥兩營也此不惟善察姦抑亦善處事矣王晦叔丞相知益州有卒夜告其軍將亂晦叔覆狀立辨其偽而斬之與此事頗相類故附著焉見尹洙龍圖所撰神道碑任顓賈昌朝附任顓侍郎知潭州時儂智髙䧟嶺南九郡宣撫司移文稱宣毅卒有功補為本軍校卒至顓察其色動曰必有姦即付所司蒐其家得細書文字記潭之軍伍兵仗城郭道路乃智髙所用為内應者顓令梟首以狥遂大為守備見本傳按征戰之際卒有功者雖補為將校亦當留軍前豈可發歸本營顓得宣撫司移文固已疑之矣其卒至而色動其有姦灼然是以即付所司且蒐其家也亦可謂善察姦矣賈昌朝丞相判大名府時妖人王則謀舉大名反河南北使其黨挾書妄言冀得近而為變昌朝察其有姦考問具服於是則惶恐獨嬰貝州以反即遣將馳兵操攻具徃見王安石丞相所撰神道碑夫言之異者必有姦也収捕考問而得其情姦何能為此與顓事畧相似也俞獻卿凡一門之事雖皆以時代為次亦或以事類相從庻便於觀覽故任顓在俞獻卿前他皆倣此俞獻卿侍郎初為夀州安豐尉有僧積施財甚厚其徒殺而瘞之乃告縣曰師出游矣獻卿揣其有姦詰之曰師與吾善不告而去何也其徒色動因執之得所瘞尸一縣大驚見本傳按僧之富者必不能出游其出游也則必治装告别亦不能如打包僧翩然徃也來告之辭已可疑矣被詰之色又可見矣有姦灼然是故執之獻卿亦可謂善察姦也張昪張昪丞相知潤州有婦人夫出數日不歸忽聞菜園井中有死人即徃視之號哭曰吾夫也遂以聞官昪命屬吏集鄰里就其井驗是其夫否皆言井深不可辯請出尸驗之昪曰衆皆不能辯婦人獨何以知其為夫収付所司鞫問果姦人殺其夫而與聞其謀也見沈括内翰筆談李繹李繹諫議知華州有蒲城縣民李藴訴盗殺其姪者繹問若有仇耶曰無若有亡失耶曰無繹曰吾得之矣若第歸因使人密刺之乃藴有陰罪懼其事暴殺以滅口也見本傳孫長卿孫長卿侍郎知和州民有訴弟為人所殺者察其言不情乃問汝户幾等曰上等也汝家幾人曰唯一弟與妻子耳長卿曰殺弟者兄也豈將併有其貲乎按之果然見王珪丞相所撰墓誌按姦人之匿情而作偽者或聼其聲而知之或視其色而知之或詰其辭而知之或訊其事而知之盖以此四者得其情矣故姦偽之人莫能欺也然茍非明於察姦之術則亦焉能與於此哉朱夀隆朱夀隆大監知彭州九隴縣時吏告一家七人以火死夀隆曰豈有一家焚而無一人脱者此必有姦踰月獲盗果殺其人而縱火見本傳夀隆熈寧四年終於少府監按此盖知其有姦而嚴於察捕故能獲盗也若信吏所告不以為意則彼得幸免矣向緯向緯郎中知鄆州陽榖縣有土豪殺人而遺其妻金以故久不發緯密得其狀一日悉逮捕至庭下而人莫知也訊之服罪見王珪丞相所撰墓誌按土豪殺人而遺其妻金與夫被人殺而受其仇金皆為姦者不可不察也若容其幸免則愈無忌憚强者害政弱者傷教無所不至矣此君子所疾故察而治之不少貸也章頻此亦以事類相從故章頻在向緯後章頻侍御知彭州九隴縣時眉州大姓孫延世偽劵奪族人田久不能辨轉運使委頻驗治之頻曰券墨浮朱上必先盗用印而後書之既引伏獄未上而其家人復訴於轉運使更命知益州華陽縣黄夢松覆按無所異夢松用此召入為監察御史頻乃坐不即具獄降監慶州酒見本傳頻景祐元年使契丹道中病卒江某江某郎中知陵州仁夀縣有洪氏嘗為里胥利鄰人田紿之曰我為若稅免若役鄰人喜剗其稅歸之名於公上踰二十年且偽券茶染紙類逺年者以訟某取紙即伸之曰若逺年紙裏當白今表裏一色偽也訊之果服見李泰伯主簿所撰墓誌江衢州開化人失其名按偽券之姦世多有之巧詐百端不可勝察著此二事亦足以鑒也薛向薛向樞密初為亰兆府戸曹參軍兼監商稅有賈人過稅務出銀二篋書其上曰樞密使遺涇原都監向曰此必偽也豈有大臣餉人物乃使賈人致之耶執詣府治之果服詐見吕大防丞相所撰墓誌按折獄龜鑑之為書也以釋寃辯誣鞫情議罪宥過懲惡嚴明矜謹八篇為正而姦慝盗賊十有二篇特為懲惡言之耳古之治此四者主於嚴眀佐以矜謹易曰君子以明慎用刑而不留獄是故列此四種之事在彼二篇之前覽者盡心庶亦有補也折獄龜鑑卷五
