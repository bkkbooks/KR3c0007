body:
  text: 折獄龜鑑卷三宋鄭克撰辨誣丙吉漢丙吉為廷尉時陳留有一老人年八十餘前妻有一女已適人後妻生一子而翁死家甚富子方數歲女欲奪其財乃誣後母所生非我父之子郡縣皆不能決聞於臺省吉乃言曰吾聞老人之子不耐寒日中無影時方八月取同歲兒均服單衣唯老人之子畏寒變色又令與諸兒立於日中唯老人之子無影遂奪財物歸後母之男前女服誣母之罪舊不著出處或疑無影恐其不然按南史蕭映傳荆州三津張元始年九十七生兒遂無影前代之人固嘗驗此尚何疑哉寒朗後漢寒朗以謁者守侍御史與三府掾屬共考案楚獄顔忠王平等辭連耿建臧信鄧鯉劉建四侯建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者朗心傷其寃試以建等物色獨問忠平而二人錯愕不能對朗知其詐乃上言建等無姦專為忠平所誣疑天下無辜類多如此帝乃召朗入問曰建等即如是忠平何故引之朗對曰忠平自知所犯不道故多有虛引冀以自明帝曰即如是四侯無事何不早奏獄竟而久繫至今邪朗對曰臣雖考之無事然恐海內别有發其姦者故未敢時上帝怒罵曰吏持兩端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳帝曰誰與共為章對曰臣自知當必族滅不敢多汚染人誠冀陛下一覺悟而已臣見考囚在事者咸云凡妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝會陛下問以得失皆長跪言舊制失大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多寃無敢牾陛下者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄録囚徒理出千餘人出後漢書本傳舊集不載按傳言朗廷爭寃獄范曄以比晏子一言齊侯省刑云篤矣乎仁者之情也彼其惶恐一切陷入無敢以情恕者唯務一已逃責豈恤衆人負寃斯不仁哉仁者必有勇於朗見之矣是故能辨誣也孫亮吳廢帝孫亮暑月遊西苑食生梅使黃門以銀碗并蓋就中藏吏取蜜黃門素怨藏吏乃以鼠矢投蜜中啓言藏吏不謹亮即呼吏持蜜瓶入問曰既蓋覆之無緣有此黃門不有求於爾乎吏叩頭曰彼嘗從臣貸宫席不與亮曰必為此也亦易知耳乃令破鼠矢內燥亮笑曰若先在蜜中當內外俱濕今內燥者乃枉之耳於是黃門服罪舊出吳志注先引吳歷云亮出西苑食生梅使黃門至中藏取蜜漬梅蜜中有鼠矢召問藏吏藏吏叩頭亮問曰黃門從汝求蜜耶吏曰向實求不敢與黃門不服侍中張邠等啓黃門藏吏辭語不同請付獄推究亮曰此易知耳令破鼠矢矢裏燥亮大笑謂邠等曰若矢先在蜜中中外俱當濕今外濕裏燥必是黃門所為黃門首服左右莫不驚悚又引江表傳云亮使黃門以銀碗并蓋就中藏吏取交州所獻甘蔗餳黃門先恨藏吏以鼠矢投餳中啓言藏吏不謹亮呼吏持餳器入問曰此器既蓋之且有掩覆無緣有此黃門將有恨於汝也吏叩頭曰嘗從臣求宫中管席宫席有數不敢與亮曰必是此也覆問黃門黃門首服兩説小異凝雜取之故破矢事出吳歷求席事出江表傳按裴松之以為鼠矢新者亦表裏皆濕黃門取新矢則無以得其姦緣遇燥矢故成亮之慧然猶謂吳歷此言不如江表傳為實夫亮所言者決定之理也松之所言者偶合之事也理雖決定事或偶合故執理以御事亦有時乎不通而窮理之人反為曉事者所笑蓋以此耳惟圓珠不滯鑒照難欺則事理兼明而情狀必得故凝雜取兩説今復備載其本末也苻融薛顔附前秦苻融為冀州牧有老姥於路遇劫喝賊路人為逐擒之賊反誣路人時已昏黑莫知其孰是乃俱送之融見而笑曰此易知耳可二人並走先出鳯陽門者非賊既而還入融正色謂後出者曰汝真賊也何誣人乎賊遂服罪蓋以賊若善走必不被擒故知不善走者賊也舊出晉書載記本傳按薛顔大卿知江寧府邏者晝劫人反執平人以告視其顔色舉動叱曰爾盜也械之果服頗亦類此見本傳蓋辨誣之術唯博聞深察不可欺惑乃能精焉丙吉所謂博聞也孫亮所謂深察也苻融驗走而得其實薛顔視色而得其情皆可謂察之深而辨之明矣若誣非難辨而勢有不敢則唯勇於義者能之寒朗是也李崇已見釋寃門御史某唐髙祖舉義師於太原李靖與衛文升仕隋守長安乃收皇族害之及平關中誅文升等及靖靖言曰公定關中唯復私讐亦為天下耶若為天下未得殺靖乃捨之及為岐州刺史或有人希旨告靖謀反者髙祖命一御史往案之謂曰李靖反狀實便可處分御史知其誣罔請與告事者偕行行數驛御史佯失告狀驚懼異常鞭撻行典乃祈告事者曰李靖反狀分明親奉聖旨今失告狀幸救其命告事者乃别疏狀與御史驗其狀與元狀不同即日還京以聞告事者伏誅失御史名舊不著出處蓋唐人小説所載也以正史考之率皆不合唐書宗室傳言淮安王神通隋大業末在長安會髙祖兵興吏逮捕亡命入鄠南山襄邑王神符為衛文升所囚京師平封安吉郡公諸公主傳言髙祖女長廣公主下嫁趙慈景帝起兵或勸亡去對曰母以我為命且安往吏捕繫于獄帝平京師拜開化郡公是靖未嘗與文升害皇族也北史衛文升傳言義師入關自知不能守憂懼稱疾不知政事城陷歸于家義寧中卒是髙祖未嘗誅文升等也唐書李靖傳言髙祖擊突厥靖為馬邑丞察有非常志自囚上急變傳送江都至長安道梗髙祖已定京師將斬之靖呼曰公起兵為天下除暴亂欲就大事以私怨殺誼士乎秦王亦為請得釋是靖之仕隋初不與守長安事也傳又言髙祖詔靖安輯江南至峽州阻賊不得前帝謂逗留詔都督許紹斬靖紹為請而免其後破冉肇則帝喜謂使功不如使過自是委以征討降蕭銑禽輔公祏是未嘗為岐州刺史亦未嘗有人告其謀反也凡小説載事多失其實不足深信然辨誣之術茍有可取亦不當廢也按辨誣之術有正有譎李崇疑其誣也故譎以求情御史知其誣也故譎以取質茍非盡心者則亦豈能精耶張楚金唐垂拱年羅織事起湖州佐史江琛取刺史裴光書割取其字輳合成文以為與徐敬業反書告之則天差御史往推光欵云書是光書語非光語前後三使皆不能決或薦張楚金能推事乃令再劾又不移前欵楚金憂悶偃卧窗邉日光穿透因取反書向日看之乃見書字補葺而成平看則不覺向日則皆見遂集州縣官吏索水一盆令琛以書投於水中字字解散琛叩頭服罪勑決一百然後斬之舊不著出處按此非智算所及偶然見之耳荀卿有言今夫亡針者終日求之而不得其得之非目益明也眸而見之也心之於慮亦然要在至誠求之不已也楚金之求獄情何以異於此哉是亦盡心之效也楚金事迹見唐書張道源傳乃其族孫也以傳考之楚金儀鳯初進刑部侍郎至垂拱初凡歷十年資望已髙矣猶被薦推事斯亦可疑也張行岌唐則天朝有告駙馬崔宣謀反者先誘藏宣妾云妾將發其謀宣殺之投尸於洛水御史張行岌案之略無迹狀則天怒令重案行岌奏如初則天曰崔宣反狀分明我令來俊臣案劾汝當勿悔也行岌曰臣推事誠不若俊臣然陛下委臣推事必須實狀若順旨妄族平人豈法官所守臣以為陛下試臣耳則天厲色曰崔宣既殺其妾反狀自然明矣妾今不獲如何可雪乃欲寬縱之耶行岌懼逼宣家訪妾宣再從弟思兢於中橋南北多致錢帛募匿妾者寂無所聞而宣家每竊議事則獄中告人輒知揣其家有同謀者因詐語宣妻曰須絹三百匹雇俠客殺告人詰旦微服伺於臺側宣有門客為宣所信同於子弟是日至臺賂閽者通消息告人遽言崔家雇客刺我請以聞臺中驚擾思兢密隨門客至天津橋罵曰君陷崔宣引汝同謀何路自脫汝出崔家妾與汝五百縑足以歸鄉成百年計不然殺汝必矣客悔謝遂引思兢於告者黨獲其妾宣乃免舊不著出處以唐史考之髙宗三女太宗二十一女其駙馬皆無崔姓髙祖十九女其駙馬有崔恭禮崔宣慶傳言宣慶妻館陶公主與趙瓌妻常樂公主姊妹也瓌為夀州刺史越王貞將舉兵遺瓌書鄉道瓌將應之主進其使語以勉王捨生取義其後王敗周興劾瓌與主連謀皆被殺然則宣豈宣慶與其或誣告殆以是歟按行岌當酷吏任事之時獨不順旨妄族平人雖再被詰責亦全其所守故卒能辨誣也其不及徐有功者未能無懼耳然其懼也但逼宣家訪妾而已則異乎懼而失守者可不謂之賢哉史逸其事故備言之張鷟唐張鷟為河陽尉有吕元者偽作倉督馮忱書盜糶官粟忱不認元堅執久不能決鷟乃取告牒括兩頭留一字問元是汝書即注云是不是即注云非元注云非去括乃是元告牒遂決五十下又取偽書括字問之元注云是去括乃是偽作馮忱書也元遂服罪舊不著出處按鷟蓋已知其誣而欲使之服故括字以核其姦問書以正其慝斯不可隱諱矣亦安得不服乎李德裕唐李德裕鎮浙西有甘露寺主僧訴交割常住物被前知事僧沒金若干兩引前數輩為證遞相交付文籍在焉新受代者已服盜取之罪未窮破用之所德裕疑其非實僧乃訴寃曰居寺者樂於知事積年以來空交分兩文書其實無金矣衆人以其孤立不狎流輩欲乘此擠之德裕惻然曰此不難知也乃以兜子數乘命關連僧入對坐兜子中門皆向壁不得相見各與黃泥令模前後交付下次金形狀以慿證據而形狀皆不同於是劾其誣罔一一服罪舊不著出處杜亞唐杜亞鎮維揚有富民父亡未幾奉繼母不以道元日上夀於母因復賜觴於子既受將飲乃疑有毒覆於地而地墳乃詬其母曰以鴆殺人上天何祐母拊膺曰天鑒在上何當厚誣職者執詣公府亞詰之曰爾上母夀酒從何來曰長婦執爵而致也母賜爾觴又從何來曰亦長婦所執之爵也長婦為誰曰此子之婦也亞訶之曰毒因婦起奈何誣母遂分於廳側劾之乃是夫婦同謀以誣其母也舊不著出處按辨誣之術或以物正其慝李德裕與泥模金是也或以事核其姦杜亞詰觴劾鴆是也此皆其正而不譎者也武行德薛居正附武行德之守洛京也國家方設鹽法有能捉獲一斤以上者必加厚賞時不逞之徒往往以私鹽中人者常有村童負菜入城途中值一尼自河陽來與之偕行去城近尼輒先入既而門司搜閲於菜籃中獲鹽數斤遂繫之以詣府行德取其鹽視之裹以白綃手帕子而龍麝之氣襲人驚曰吾視村童弊衣百結蓋窶之甚者也豈有薰香帕子必是姦人為之耳因問曰汝離家以來與何人同途村童以實對行德聞之喜曰吾知之矣此必天女寺尼與門司冀幸以求賞也遂問其狀命親信捕之即日而獲其事果連門司而村童獲免自是官吏畏服而不敢欺京師肅然先是行德以採薪為業氣雄力壯一谷之薪可以盡負置麾下攀鱗附翼遂至富貴然聽訟甚非所長至是明辨如此論者異之按薛居正丞相漢乾祐中為開封府判官時吏有告民以鹽冒法者獄具當死居正疑之召詰其狀乃是有憾以鹽誣之也逮捕具服即抵吏法與行德事頗相類矣彼以希賞而然此以釋憾而然皆能辨明其誣者唯在深察其事也二事並見本傳張保雍張保雍刑部為湖北轉運使時漢陽俚民販茶知軍駱與京誣其捍巡檢二十人法當死百餘人當從坐保雍親往慮之遂明其誣首得不死從者皆貰見曽鞏舍人所撰神道碑按誣人大辟必不徒然或以希賞或以釋憾斯不仁哉宜乎保雍力為辨雪也王長吉江南提點刑獄王長吉等言南安軍上猶縣僧法端守肱忿漁人索魚直誣以行劫賂縣胥集耆保掩捕其家四人遭殺三人被傷以殺獲劫賊告於官縣尉驗尸受賕隱其縻縛之迹縣令覆視老眊又為典吏所罔本軍劾得實僧皆坐死餘當原赦請理巨蠧以其狀聞詔縣尉杖脊配道州衙前縣令貶文學參軍餘配廣南者十五人以僧私田給漁者家見祥符九年詔令按僧誣漁者本非難辨庸吏漫不省察姦吏相與為市故如此耳長吉劾正其罪雖已無及然猶愈於縱惡不治特著于篇庶可鑒也王臻賈昌齡附王臻諫議知福州時閩人欲報仇或先食野葛而後鬬即死其家遂誣告之臻問所傷果致命耶吏持驗狀曰傷無甚也臻以為疑反訊告者乃得其實按賈昌齡少卿初為饒州浮梁尉其俗輕死與人有怨往往先食野葛以誣怨者昌齡輒能辨究之與臻問傷類矣是皆深察者也錢惟濟錢惟濟留後知綘州民有條桑者盜強奪之不能得乃自斫其右臂誣以殺人官司莫能辨惟濟引問面給以食而盜以左手舉匕筯因語之曰他人行刃則上重下輕今下重上輕正用左手傷右臂也誣者引伏已上三事並見本傳按此以其傷下重上輕知為自用刃矣但疑在右臂故給之食以驗其手而誣狀灼然彼安得不服耶方偕唐介附方偕大卿為御史臺推直官時澧州逃卒與富民有仇誣以歲殺人十二祭磨駝神逮捕繫獄而久不決詔偕就鞫之偕命告人疏所殺主名尋訪考驗尚多無恙事遂辨白見天聖名臣傳按王圭丞相撰唐介參政墓志言介為嶽州沅江令按宋史唐介傳介為平江令斷李氏事今書中作沅江令考地理志嶽州有平江縣沅江本𨽻常德乾道中始割𨽻嶽州介係仁宗時人當從宋史作平江令州民李氏有巨資吏數以事動之既不厭所求乃言其家歲殺人祠鬼會知州事孟合喜刻深悉捕繫李氏家無少長榜笞久莫伏以介治縣有能名命更訊之介按劾無他狀合怒以其事聞朝廷詔遣殿中侍御史方偕徙其獄于澧州已而不異介所劾其後州吏皆坐罪去偕以活死者得官介終不自言此與章頻驗治偽劵而黃夢松擢用類矣皆篤厚君子也頻事見察姦門然則誣告者非澧州逃卒而富民乃嶽州人特徙其獄于澧州鞫之耳且偕是時不為推直官也名臣傳所書不若此志本末詳備殆未得其實歟惟使告人具疏主名辨誣之術有足取者故特著之杜衍李絃附杜衍丞相提點河東刑獄時髙繼升知石州為其僕所告云與西河蕃部謀叛捕繫數百人久不決詔衍覆案得僕誣狀卒論殺之按李紘龍學為殿中侍御史時皇城司卒有告賈人為契丹刺事者捕繫起大獄更詔紘訊之盡得其寃狀告者遂伏辜頗亦類此誣告人罪法當反坐茍非明察豈能然耶已上二事並見本傳程戡程戡宣徽知處州民有積為仇者一日諸子私謂其母曰今母老且病恐不得更夀請以母死報仇乃殺其母置仇人之門而訴於官仇者不能自明而戡疑之僚屬皆言理無足疑戡曰殺人而置其門非可疑耶乃親劾治具得本謀見王圭丞相所撰墓志蘇渙陸廣附蘇渙郎中知衡州時耒陽民為盜所殺而盜不獲尉執一人指為盜渙察而疑之問所從得曰弓手見血衣草中呼其儕視之得其人以獻渙曰弓手見血衣當自取之以為功尚何呼他人此必為姦訊之而服他日果得真盜見蘇轍門下所撰墓志按辨誣者或以情理察之程戡是也或以辭理察之蘇渙是也皆可謂之明矣然陸廣校理知導江縣時盜入民家尉誣一人執以詣縣廣視而言曰非也釋之尉力爭衆亦疑終不聽後果獲真盜見王安石丞相所撰墓志此何以知之蓋廣能布耳目察民事而先知尉所執非盜則不必如渙問所從得也衆既莫曉故亦疑焉至于獲真盜終不以語人蓋布耳目察民事者不可使衆皆知也郭勸郭勸給事通判萊州時有民為仇人所誣罪當死吏受賕且傅致勸為辨理得免民家畫其像而生祠之見本傳冦平冦平少卿知淮陽軍始至會獄有繫囚當殊死疑未得實而更訊之果為吏所誣囚且釋吏僅得減死衆相戒敕不敢為欺見王圭丞相所撰墓志按勸與平所以辨誣不得之其辭則得之其情也明可知矣是故造誣者懼焉被誣者懷焉皆其盡心察獄之效也單孟陽單孟陽大卿為御史臺推直官時有以贓誣江南轉運使吕昌齡者中丞張升亦言之纍鞫不承詔孟陽以制獄案治孟陽雖御史屬不阿其長而卒直之因請避得知濮州見本傳畢仲遊畢仲遊大夫提點河東刑獄時韓縝丞相出鎮太原家奴胡童自陳有卒剽劫其衣服於黃堂之側怒以付吏將黥配之仲遊謂小童衣服鮮薄而剽劫於大帥故相之宇下非人情也易吏案治其誣乃辨見陳恬直閣所撰墓志按誣有難知者有易知者智不足則有所惑而於難知者不能辨矣勇不足則有所懼而於易知者不敢辨矣茍不能辨則亦奚足責若不敢辨斯實可罪孟陽之鞫贓不阿中丞意仲遊之案劫不避大帥怒所謂勇於義者也魏濤景德驛卒一事附魏濤朝奉知沂州永縣兩仇鬬而傷決遣而傷者死濤求其故而未得死者子訴于監司怒有惡語濤歎曰官可奪而囚不可殺後得其實是夕罷歸騎及門墜而死鄰證既明其誣乃辨見陳師道正字所撰墓志按此蓋死者子因其常鬬以誣其仇人也夫鬬而即決者傷不致甚法無保辜今乃誣以傷而死也且辜限內死若有他故唯坐傷罪彼騎而墜是他故也可見其傷不應保辜也濤能求得其實辨明其誣可謂盡心矣景德間有縣胥醉與驛卒相毆夜歸胥仆於路或以告卒地寒恐僵死卒往視之則已死矣里胥執送官以為毆殺人其實寒凍死也卒之母訴于州又訴于朝皆反得罪真宗以此喻宰臣令謹擇刑獄之官若鬬傷者不遇魏濤則驛卒何以異哉其能盡心亦足為賢也鞫情胡質王靖附魏胡質初召為東郡蝢邱令縣民郭政通於從妹殺其夫程他郡吏馮諒繫獄為證政與妹皆耐掠隱抵諒不勝痛自誣當反其罪質至官察其情色更詳其事檢驗俱服出魏志本傳舊集不載按此蓋初察其色已見其情乃更詳其本末而驗核以事驗證以物於是情既露矣辭必窮矣安得不服乎王靖少卿提點河東刑獄時潞州長子賊殺人不獲縣械十數掠治無狀皆釋去靖視其牘曰此真賊也教吏訊囚曲折果服罪見本傳靖熙寧四年終於太常少卿度支副使是亦耐掠隱抵者也其能使之服罪何哉蓋察其疑辭而見其本情已識其為真賊矣於是曲折詰問攻其所抵中其所隱辭窮情得勢自屈服斯不待於掠治也然則鞫情之術或先以其色察之或先以其辭察之非負寃被誣審矣乃檢事驗物而曲折訊之未有不得其情者也司馬岐王濟附魏司馬岐為陳留相時梁郡有繫囚多所連及數歲不決詔書徙獄於岐屬縣請豫治牢具岐曰今囚有數十既巧詐難符且已倦楚毒其情易見豈當復久處囹圄耶及囚至詰之皆莫敢匿詐一朝決竟出魏志司馬芝傳岐其子也舊集不載按王濟郎中初為漳州龍溪主簿時汀州以銀冶事起訟踰十年不決連逮數百人轉運使命濟鞫之裁七日盡得其情從坐者數人而已見本傳濟大中祥符四年終於刑部郎中知洪州此二事相類矣夫囚有數十巧詐難符茍能檢核驗證亦何至近者數歲逺者十年不能決耶是皆官吏不肯盡心而然也岐于梁郡之囚一朝決竟濟于汀州之訟七日得情雖云已倦楚毒其情易見若非盡心推事豈能如是之敏耶陳表傅岐附吳陳表以父死敵場擢用為將時有盜官物者疑無難士施明明素壯悍收考極毒俟死無辭廷尉以聞孫權以表能得健兒之心詔以明付表使自以意求其情實表破械沐浴易其衣服厚設酒食歡以誘之明乃首服具列支黨表以狀聞權竒之欲全其名特為赦明誅戮其黨明感表變行遂成健將致位將軍舊出吳志陳武傳表其子也按梁傅岐為新安郡始新令縣人有因鬬相毆而死者死家訴郡郡録其仇人考掠備至終不引咎乃移獄于縣岐即令脫械以和言問之囚便首服出南史傅琰傳岐其孫也舊集不載此亦歡以誘之者也宋文帝宋文帝元嘉二十二年孔熙先與徐湛之許耀謝綜范曄謀立彭城王義康湛之上表告狀詔收綜等並皆欵服唯曄不首頻詔窮詰曄言熙先茍誣引臣文帝令以曄所造及改定處分符檄書疏墨迹示之乃引罪出南史范泰傳曄其子也舊集不載崔昂北齊崔昻為度支尚書時有肴藏小吏因內臣投書告事又别有飛書告事者並付昻窮檢昻言笑間咸得其情告者辭窮並引誣狀於是飛書遂絶出北史崔挺傳昻其孫也舊集不載按鞫情之術有證之以其迹者宋文是也有核之以辭者崔昻是也昻於鞫情可謂精敏然不過盡心研究以盤詰使之辭窮則其情得矣誣告之禍賴此而絶其為功利不亦溥哉王璥唐貞觀中左丞李行亷弟行詮前妻子忠蒸其後母遂與潛藏云勑追入內行亷不知乃以狀聞朝廷推詰甚急後母詐以領巾勒項卧街中長安尉詰之云有人詐宣勑喚去一紫袍人見留數宿不知姓名因勒送街中縣尉王璥令并其子引就房推問不服璥先令一胥伏於案下又令一胥走報云長史喚璥倉皇鎖房門去於是母子相謂曰必不得承復有私密之語璥至開門案下之人亦出母子大驚並服其罪舊不著出處陳樞陳樞都官初為宣州旌德令時繁昌有大姓殺人州縣不能正其罪監司徙其獄屬樞乃驗治僮客盡得其隱伏殺人者論死人以為盡其情見曽鞏舍人所撰墓志按鞫情之術有正有譎正以核之陳樞是也譎以擲之王璥是也術茍精焉情必得矣恃考掠者乃無術也葛源葛源郎中初為洪州左司理參軍州將之甥與異母兄毆人而甥殺人州將謂源曰兩人者皆吾甥而殺人者乃其兄也我知之彼大姓也無為有司所誤不然此獄將必覆也源劾不為變見王安石丞相所撰墓志按情非難鞫也或變其情則如之何源之有守與詔指所謂觀望臣庶而容心者異矣良可嘉也司馬宣司馬宣駕部為華州司理參軍時有驍騎卒十餘犯罪謀亡去監押捕獲遂誣以共圗不軌欲置之死以希功賞宣據實鞫之皆止杖罪見司馬光丞相所撰墓志按監押之勢力豈能動司理必有以誘之也脅之以勢而不為變者可謂勇矣葛源是也誘之以利而不為變者可謂仁矣司馬宣是也鞫得其情智足稱也茍不仁且無勇則有為誘脅所動而變其情者故甫刑云非佞折獄惟良折獄此之謂也李南公李南公尚書提點河北刑獄時有班行犯罪下獄按之不服閉口不食百餘日獄吏不敢考訊甚以為患訴于憲使南公曰吾能立使之食引出問曰吾欲以一物塞汝鼻汝能終不食乎其人懼即食且服罪彼蓋善服氣以物塞鼻則氣結故懼此亦博聞之效也聞之士林按士大夫不為誘脅所動者近於孟子之不動心矣彼有負犯則豈能然斯可反而用也故鞫情之術有在於是者陳表破械是誘之也南公塞鼻是脅之也所謂脅之者不必考掠慘酷也要在中其忌諱使之悚然畏服故於塞鼻之説亦有取焉折獄龜鑑卷三
