body:
  text: 提要折獄龜鑑八卷法家類臣等謹案折獄龜鑑宋鄭克撰是書宋志作二十卷晁公武讀書志陳振孫書録解題俱題作决獄龜鑑盖一書而異名者也大㫖以五代和凝疑獄集及其子㠓所續均尚未詳盡因採綴舊文補苴其闕分二十門其間論斷雖意主尚徳緩刑而時或偏主於寛未能悉協中道所輯故實務求廣博多有出于正史之外者而亦或兼收瑣細未免猥雜然究悉物情用廣見聞而資觸發較和氏父子之書特為賅偹晁公武讀書志稱其依劉向晏子春秋舉其綱要為之目録體例井然亦可謂有條不紊者也書録解題載其目凡二百七十六條三百九十五事今世所𫝊鋟本祇存五門餘皆散佚惟永樂大典所載尚為全書而已經合併原書二十卷之界限不復可考謹詳加校訂析為八卷卷數雖減于舊其文則無所缺失也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書折獄龜鑑目録卷一釋寃上卷二釋寃下卷三辨誣鞫情卷四議罪宥過卷五懲惡察姦卷六覈姦摘姦察慝證慝卷七鈎慝察盜迹盜譎盜察賊迹賊譎賊卷八嚴明矜謹折獄龜鑑原序天開元㑹一統同文宜春舊有書版鐍於郡齋其在今日蒐放失補殘斷莫先焉至元辛巳秋仲府尹張公國紀發其藏歸校官若春秋分記紫陽四書昌黎文黄陳詩註折獄龜鑑廉吏傳併有先儒講義洎南陽活人書與局方醫書咸切於用而滅裂亾完者越半載同知郝公居正來莅郡事以敦化善俗為己任顓命刋補於是悉備文學掾趙君炞石書來諗予因惟聖賢託憲言貽後人所以共天命樹民彞也善鋟以廣其傳此良師帥職分所在曷厄於時多有缺軼易曰湯武革命順天應人此邦之人粗識事理金城夾附未嘗有烽火之警眡他路貯書宜如舊奈何脫落無善本殆不可曉幸而今之從政者作興斯文獨劬精而成之繼今共學之士相與朂勵養根竢實加膏希光毋敝口耳以負初意至元元黓敦䍧夏五汎蒲日奉訓大夫湖南道儒學提舉陵陽虞應龍序
