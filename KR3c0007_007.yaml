body:
  text: 折獄龜鑑卷七宋鄭克撰鈎慝李崇已見釋寃門按崇之譎以舉哀擲爭兒姦與其術同蓋自其巧詐而言之則謂之姦自其隱慝而言之則謂之慝其實無異也故術亦同焉張元濟按新唐書夲傳作允濟冊府元龜亦作元濟與此本同唐張元濟隋大業中為武陽令務以德教訓下百姓懷之元武縣與其鄰接有人以牸牛依其妻家者八九年牛孳生至十餘頭及將異居妻家不與縣司纍政不能决其人詣武陽質於元濟元濟曰爾自有令何至此也其人垂泣不止且言所以元濟遂令左右縳牛主以衫䝉其頭將詣妻家村中云捕盜牛賊召村中牛悉集各問所從來處妻家不知其故恐被連及指其所訴牛曰此是女聓家牛也非我所知元濟遂發蒙謂妻家人曰此即女聓可以歸之妻家叩頭服罪舊出唐書本傳按史記以西門豹附滑稽傳後豹古循吏也特以其止河伯娶婦事巧而捷乃發於俳者故曰滑稽耳元濟其豹之儔歟理鄰邑贅壻牛亦以發於俳故能巧而捷與止河伯娶婦事相類矣然乃循吏鈎慝之術也疑獄集又載新鄊令裴子雲一事云部民王恭戌邉牸牛六頭於舅李璡家養五年産犢三十頭恭還索牛舅曰㹀牛二頭已死乃還四頭老㹀餘非汝牛所生恭訴於縣子雲以恭付獄追盜牛賊李璡璡惶怖而至子雲叱責曰賊引汝同盜牛三十頭藏汝莊內喚賊對辭乃以布衫籠頭立南墻下璡急吐款云三十頭牛是外甥㹀牛所生非盜得來子雲令除恭頭布衫璡驚曰此是外甥子雲曰是即還牛更欲何語璡默然復謂璡曰五年養牛辛苦特與五頭餘並還恭聞者歎服舊不著出處此乃用元濟鈎慝之術者但部民則易追而非部民則難追矣故元濟詣彼村中捕盜也然越境有所捕召集一村牛亦是當時可以為此若在異日止合移文追而詰之如趙和者是也但欲巧捷者勢須為此耳趙和侯臨附唐江隂令趙和咸通初以折獄著聲淮隂有二農夫比莊通家東鄰嘗以莊契質于西鄰後當取贖先送八百千自恃密熟不取文證冉齎餘鏹至西鄰遂不認東鄰訴于縣又訴于州皆不獲伸理遂來訴于江隂和曰縣政甚卑何以奉雪東鄰泣曰至此不得理則無處伸訴矣問爾果不妄否曰焉敢厚誣乃召捕賊之幹者齎牒淮隂云有劫江賊案劾巳具其同惡在某處姓名狀貌悉以西鄰指之請梏付差去人西鄰自恃無迹初不甚懼至則械于庭和厲聲詰之囚泣訴其枉和曰事迹甚明尚敢抵諱所劫之物藏汝莊中皆可推驗汝具藉資産以辨之囚不虞東鄰之越訴乃供折榖若干莊客某人者細絹若干家機所出者錢若干東鄰贖契者和復審問乃謂之曰汝非劫江賊何得隱諱東鄰贖契錢八百千遂引其人使之對證於是慙懼服罪梏回本縣檢付契書置之于法舊不著出處按和所用之術蓋亦本于張元濟也近時小說載侯臨侍郎一事云臨為東陽令時他邑有民因分財産寄物姻家遂被諱匿屢訴弗直聞臨治聲來求伸理臨曰吾與汝異封法難以治止令具物之名件而去後半年縣獲强盜囚縱令妄通有贓物寄某家乃捕至下獄引問泣訴盜所通金帛皆親黨所寄臨即遣人追民識認盡以還之此乃用和鈎慝之術者雖巧捷不逮而沉密過之譬猶持重之將不茍出于竒亦必依于正以此用譎則無敗事尤可貴也包拯錢和附包拯副樞初知揚州天長縣時有訴盜割牛舌者拯密喻令歸屠其牛而鬻之遂有告其私殺牛者拯詰之曰何為割某家牛舌而又告之其人驚服見本傳按近時小說載朝散大夫錢和一事云和嘗知秀州嘉興縣有村民告牛為盜所殺和令亟歸勿言告官但召同村解之遍以肉餽知識或有怨即倍與民如其言明日有持肉告民私殺牛者和即收訊果其所殺此乃用拯鈎慝之術者蓋以揣知非仇不爾故用此譎使復出告也昔趙廣漢善為鈎距以得事情晉灼云鈎致也距閉也蓋以閉其術為距而能使彼不知為鈎也夫惟深隱而不可得故以鈎致之彼若知其為鈎則其隱必愈深譬猶魚逃於淵而終不可得矣是故史稱唯廣漢至精能用之他人效者莫能及也此數君子材智過人亦庶幾焉察盜按此門原缺標題今補張敞黃昌附漢張敞為京兆尹長安市偷盜多百賈苦之敞既視事求問父老偷盜酋長數人居皆溫厚出從童騎閭里以為長者敞皆召見責問因貰其罪把其宿負令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受職按職漢書作署敞皆以為吏遣歸休置酒小偷悉來賀飲且醉按漢書作且飲醉偷長以赭汙其衣𥚑吏坐閭里閲出者汙赭輒收縳之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是桴鼓稀鳴市無偷盜出漢書本傳舊集不載按盜賊不得獄訟必多其當察而治之亦與奸慝等矣是以舊集有彭城書菜元膺擒輿之類凡十餘事今則因而列此六門也敞以偷盜治偷盜督察之術莫善於此故首著焉若後漢黃昌為蜀郡太守密捕盜帥一人脅使條陳諸縣強暴姓名居處分遣掩討無有遺脫宿惡大姦奔走他境則又猛政之尤者抑亦用敞察盜之術歟曹攄晉曹攄為洛陽令大雪宫門夜失行馬攄使收門士衆謂不然攄曰宫掖禁嚴非外人所敢盜必是門士以燎寒耳訊之果服舊出晋書本傳按此以事理察之也攄若不善察盜姑狥衆人所見則有罪者幸免而無辜者濫及獄訟不勝其繁矣是故折獄之術亦有取於此也蘇瓊夲傳盜牛一事附北齊蘇瓊為齊州行臺左丞行徐州事城中五級寺忽被盜銅像一百軀有司搜檢四鄰防宿及蹤迹所疑逮繫數十人瓊一時放遣寺僧怨不為推賊瓊曰便且還寺得像自送爾後十日抄賊姓名及贓處所徑收掩悉獲之出北史本傳舊集不載按傳又載一事云瓊為南清河太守時有魏雙成者失牛疑其村人魏子賔列送至郡一經窮問知其非盜而便放之雙成云府君放賊去百姓牛何處可得瓊不理其語密遣訪獲盜者與此相類蓋能廣耳目以察盜賊也傳言郡中有舊賊一百餘人悉充左右人間善惡及長吏飲人一杯酒無不即知此其耳目歟然既曰舊賊必非志實豈可深信乃見親委耶魏吳校事竊權害政人皆患苦久乃誅戮瓊之駕馭何以勝彼而能免斯患耶張敞召偷長悉受職特取其一時之用而已矣未嘗置之左右任以耳目豈非慮患深歟瓊廣耳目察盜賊可也此一事不足法略辨其理云韓褒尹賞附後周韓褒為北雍州刺史州帶北山多有盜賊褒密訪之並豪右所為也而陽不之知厚加禮遇謂曰刺史起自書生安知督盜所賴卿等共兮其憂耳乃悉召桀黠少年素為鄉里患者置為主帥分為地界有盜發而不獲者以故縱論于是惶懼首服曰前盜發者並某等為之所有徒侣皆列其姓名或亡命隱匿者亦悉言其所在褒乃取盜名簿藏之因大榜州門曰自知行盜者可急來首即除其罪盡今月不首者顯戮其身籍沒妻子賞先首者旬月之間諸盜咸悉首盡褒取名簿勘之一無差異並原其罪許以自新由是羣盜屏息出北史本傳舊集不載按褒之察盜與張敞類矣若尹賞為長安令則不然部勒户曹掾史與鄉吏亭長里正父老伍人雜居長安中輕薄少年惡子無市籍商販作業而鮮衣凶服者悉籍記之得數百人一朝㑹長安吏車數百兩分行收捕皆劾以為通行飲食羣盜賞親閲見十置一其餘悉納虎穴中穿地方深各數丈致令辟為郭以大石覆其口名曰虎穴百人為輩數日一發視皆相枕藉死後世縣令不能㑹吏車如此之多亦不敢為虎穴使數百人相枕藉死蓋時異則法異也所置數十百人乃其魁宿或故吏善家子失計隨輕黠願自改者貰其罪詭令立功以自贖盡力有效者因親用之為爪牙追捕甚精郡國亡命散走各歸其處不敢窺長安見漢書本傳賞雖亦以偷盜治偷盜善于駕馭稱其職任然異乎張敞不純用誅罰故號酷吏為萬世戒唯褒之察盜視敞可以無愧其不同者彼窮治所犯紏之以猛也此首原其罪施之以寬也敞之猛不至於民殘而市無偷盜褒之寬不至於民慢而羣盜屏息則是同歸於治也栁慶巳見釋寃門張允濟按允濟前條作元濟蓋傳寫異文唐張允濟初仕隋為武陽令時道中見一姥種葱結菴守之允濟曰但歸不煩守此遇盜即來告姥婦一宿而葱大失允濟乃召集葱地左右居人呼令前一一聼之遂得盜葱者舊出唐書本傳按周禮以五聲聼獄訟求民情一曰辭聼觀其出言不直則煩二曰色聼觀其顔色不直則赧三曰氣聼觀其氣息不直則喘四曰耳聼觀其聼聆不直則惑五曰目聼觀其顧視不直則眊允濟召集葱地左右居人呼令前一一聼之遂獲盜葱者蓋用此術也然其意度頗涉矜衒非不得已而用之則與郤雍視盜察其眉睫之間而得其情者何以異哉苟未能使人耻為盜不若聼姥守之也蘇無名唐則天時太平公主庫中失所賜寶器天后怒督捕甚峻官吏震恐有湖州别駕蘇無名善擒奸擲伏遊徼至縣請見長史長史問之請聞朝廷天后召見無名對曰請寬府縣盡以捕盜吏卒付臣不過教日决為陛下獲盜天后許之無名戒吏卒於東北門伺察有人十餘輩衣衰絰出赴北邙即踵以報果見諸人至一新冡設奠哭而不哀既徹奠又巡行冡旁相視而笑無名喜曰得之矣遂使吏卒盡執之而發其冡剖棺視之寶器在焉天后問以何術獲盜對曰臣無他術但識盜耳臣到都日正見此輩出葬便知是盜但未知葬處今清明拜掃計必出城尋逐蹤跡可以得之哭而不哀者所葬非人也巡冡而笑者喜其無傷也向若陛下迫促府縣此賊計急必取而逃矣天后稱善遷秩二等舊不著出處董行成唐懷州河內縣董行成善察盜有人從河陽長店盜一驢并囊袋天欲曉至懷州行成市中見之叱曰彼賊住盜下驢即承伏少頃驢主尋蹤至或問何以知之曰此驢行急而汗非長行人也見人即引驢逺過怯也是故知其為盜也舊不著出處按蘇與董非聞人也特以察盜尺寸之長著於舊集傳於今世與賀懷智琵琶米嘉榮歌李謨笛託名唐人詩中者類矣苟無所長誰復稱之使不泯沒亦足勸能也裴度許仲宣附唐裴度在中書時堂吏忽報亡失省印同列驚愕皆欲究治度略不顧問良久復報印在故處度笑謂同列曰此必吏人盜印驛劵也向若急之則投諸水火矣同列乃服出趙璘因話録舊集不載按此蓋以事理察盜者也其略不顧問則與蘇無名請寬府縣之意同矣彼緩以伺之獲為盜之人此緩而待之獲所盜之物皆可謂善處事也許仲宣漢乾祐初登進士第為曺州濟隂簿先是縣印令與簿晝夜更掌時令有妾與室爭寵不能禁妾恚恨欲陷其主於罪竊取印藏之封緘如故仲宣受之翌日吏將用印開但空匣因逮捕縣吏及令簿㒒厮家人繫獄驗問果得於令舍人竇大煙煤中初失印衆皆恐仲宣晏然不為之動既而果獲人服其量此乃量足以處事識足以察盜者也夫吏盜省印以有所欲故爾妾盜縣印以有所忿故爾此兩者可以得盜之情矣則當用是察之也仲宣後事本朝終於給事中見本傳閻濟美唐閻濟美鎮江南有舟人傭載一賈客物甚繁碎密隱銀十錠於貨中舟人窺見伺其上岸盜之沈於泊船之所夜發至鎮旦閲諸貨而失其銀乃執舟人詣官濟美問船上有何物曰搜索皆無昨夜宿何處曰去此百里浦汊中亟令武士與船夫同往索之密諭武士曰必是舟人盜之沈於江中矣可令楫師沈鈎取之獲當重賞武士依命獲篋銀在其中封題猶全舟人遂服罪舊不著出處按治民之官每患姦盜敢為欺蔽善料事者譬猶用兵善料敵也濟美所以知舟人盜銀沈于江中者此耳是亦可稱也歐陽頴歐陽頴郎中知歙州富家有盜啓其藏捕甚急久不獲有司苦之頴曰勿捕獨召富家二子械付獄鞫之吏民皆曰是素良子也大怪之二子服罪猶疑不勝楚掠而自誣及取其所盜某物於某處皆是乃歡曰公神明也見歐陽修參政所撰墓志何中立何中立龍學知開封府先有盜慈孝寺神御服器者知府李絢嘗以屬吏不服而釋之及中立視事或復執所釋囚至中立熟視之曰此真盜也遂窮治之盡得其贓見本傳徐的徐的省副知荆南府荆南故多大姦人緣以為盜有一夕十發者的籍諸惡少為保伍使更相伺察由是火幾息見夲傳按此蓋用韓褒察盜之術也若火發處有盜不獲同保伍人以故縱論則彼焉敢不察姦盜乎由是火幾息蓋火乃姦盜為之也彭思永彭思永侍郎為益州路轉運使時攝成都府事蜀民以交子貿易多置衣帶中而盜於爪甲挾刃伺便微取之至十百而不敗民甚病之思永捕獲一人使盡疏其黨悉黥𨽻諸軍盜以衰息見夲傳按此蓋用黃昌捕盜帥一人脅使條陳諸縣強暴分遣掩討之術也若非有以脅之豈肯盡疏其黨無所隱漏乎若非分遣掩討豈能黥𨽻諸軍無所遺脫乎雖以嚴治而無酷名止用其察盜之術而不為其殘民之政此又賢於黃昌逺矣迹盜尹翁歸漢尹翁歸守右扶風姦邪罪名縣各有籍盜賊發其比伍中翁歸輒召其縣長吏曉告以姦黠主名教使用類推迹盜賊所過抵類常如翁歸言無有遺脫出漢書本傳舊集不載按翁歸之治姦邪也雖各有名籍不比而誅之必待盜賊發其比伍中乃召長吏教使推迹無有遺脫則與尹賞黃昌異矣是故彼有惡名而此得美譽蓋其材頗同而德弗類也迹盜之術此其大者故首著焉髙浟北齊彭城王浟為滄州刺史有一人從幽州來驢䭾鹿脯至滄州界腳痛行遲偶㑹一人為伴盜驢及脯去明旦告州浟乃令左右及府僚吏分市鹿脯不限其價其主見識之推獲盜者轉都督定州刺史時有人被盜黑牛背上有白毛長史韋道建謂中從事魏道勝曰使君在滄州擒姦如神若捉得此定神也浟乃詐為上府市牛皮倍酬價直使牛主認之因獲其盜建等歎服又有老母姓王孤獨種菜三畝數被偷乃令人密往書菜葉為字明日市中看菜菜有字獲賊爾後境內無盜政化為當時第一舊出北史本傳按前二事皆有迹可求而菜之迹頗難辨故以書字驗之若夫詐為上府買皮而倍酬其直乃兼以譎取之者也髙湝北齊任城王湝領并州刺史一婦人臨水浣衣有騎馬人換其新靴馳去婦人持故靴詣府訴湝㽜靴召居城諸嫗以靴示之紿曰有乘馬於路被賊殺害遺此靴焉得無親戚乎一嫗拊膺哭曰兒昨著此靴向妻家如其語捕獲之一時稱明察舊出北史本傳按湝留故靴者將以迹求之也紿諸嫗者兼以譎取之也與浟買皮事頗相類然居城諸嫗所以可召者北齊承後魏喪亂之後并州城中居人不多雖盡召之亦不為擾苟或蕃庶當如楊津下教而已此在隨事制宜也張鷟唐張鷟為河陽尉有客驢韁斷并鞍失之三日訪不獲詣縣告鷟推窮甚急乃夜放驢出而藏其鞍鷟曰此可知也遂令不秣飼驢去轡放之驢尋向昨夜餵處乃搜索其家於草積下得之人服其智舊不著出處按管仲之相齊侯也伐山戎還而迷失道仲令解縱老馬軍隨以行乃得之鷟蓋采用此術也夫故道有迹可求而人莫能識彼皆識故道者則宜假以求之矣是亦君子善假於物之義也顧憲之任牛索主亦以此歟桑懌桑懌崇班嘗居汝頴間諸縣多盜自請補耆長往來察姦匪因召里中惡少年戒之曰盜不可為吾不汝容也有頃里父子死未斂盜夜脫其衣去父不敢告官懌疑少年王生者為之夜入其室得其衣而王生未之知也明日見而問之曰爾許我不為盜今盜里父子尸非爾耶少年色動即推仆地縳之詰共盜者姓名盡送縣皆按以法見歐陽修參政所撰懌傳按朱邑為桐鄉嗇夫而死有遺愛仇覽為蒲亭長而時稱大化懌之賢雖不逮古人請為耆長事亦可書故卒能立功當世垂名太史此特稱其迹盜之一莭爾亦足以勸也譎盜髙謙之後魏髙謙之為河隂令有人囊盛瓦礫指作金詐市人馬因而逃去詔令追捕甚急謙之乃僞枷一囚立於馬市宣言是前詐市馬賊今欲刑之密遣腹心察市中私議者有二人相見欣然曰無復憂矣執送案問悉獲其黨舊出北史髙恭之傳謙之其兄也按譎盜之術與擲姦同彼亦用譎以擲之也慕容彥超錢惟濟附漢慕容彥超為鄆帥日置庫質錢有姦民以僞銀二鋌質錢十萬主使久之乃覺彥超隂教主吏夜穴庫牆盡徙其金帛於他所而以盜告彥超即榜于市使民自占所質以償之民皆爭以所質物自言已而得質僞銀者執之服罪舊出五代史本傳按錢惟濟留後知成德軍有以僞銀質錢者其家告官惟濟密謂曰第聲言被盜而立賞捕之質僞銀者必來責餘直果然乃用彥超譎盜之術者也見本傳彼有譎之不出者何哉或盜轉而之他或盜知其為譎也是故用譎宜密而速與兵法同矣孫沔巳見懲惡門陳述古陳述古密直嘗知建州浦城縣富民失物捕得數人莫知的為盜者述古紿曰某廟有一鐘至靈能辨盜使人迎置後閣祠之引囚立鐘前喻曰不為盜者摸之無聲為盜者則有聲述古自率同職禱鐘甚肅祭訖帷之乃隂使人以墨塗鐘良久引囚以手入帷摸之出而驗其手皆有墨一囚獨無墨乃見真盜恐鐘有聲不敢摸者訊之即服見沈括內翰筆談云此亦古法出於小說按譎非正也然事有賴以濟者則亦焉可廢哉抑又聞之正不廢譎功乃可成譎不失正道乃可行是於譎盜之術取其一端而已蓋亦未可責備也然與鑊摸鐘皆用譎鈎慝頗似鞫情之術矣但意所主者特在於盜故以附譎盜門也察賊趙廣漢孫沔附漢趙廣漢為京兆尹郡中盜賊閭里輕俠其根株窟穴所在及吏受取請求銖兩之姦皆知之長安少年數人㑹窮里空舍謀行劫坐語未訖廣漢使吏捕治具服出漢書本傳舊集不載按此廣耳目以察賊者也孫沔副樞知徐州時淮陽軍有強盜數人捕之急過徐境沔即知之方晏客淮陽檄至召吏諭曰淮陽賊幾人易衣冠舍其處少頃皆捕至庭下見孫威敏公遺事録與廣漢類矣史稱廣漢善為鈎距以得事情謂鈎致其隱伏使不得遁距閉其形迹使不可窺也世言沔所用為耳目者雖左右親信之人亦莫能曉殆亦挾此術歟苻融巳見釋寃門栁崇後魏栁崇為河中太守郡人張明失馬疑執十餘人崇初到郡見之不問賊事人别借以溫顔更問其親老存否農業多少而微察其辭色即獲真賊吕穆等二人餘並放遣郡中畏服境內帖然出北史本傳舊集不載按崇不問賊事者惡彼匿其情也問以親老存否農業多少者欲彼吐其情也於是真情見乎辭色乃可微察以獲真賊是亦用鞫情之術者也賊與盜異害物曰賊攘物曰盜劫取曰賊竊取曰盜此失馬者殆被劫歟不然何以疑執十餘人也韋鼎隋韋鼎為光州刺史州中有土豪外修邉幅而內行不軌嘗為劫盜鼎於都㑹時謂之曰卿是好人那忽作賊因條其徒黨姦謀逗遛其人驚懼即自首服出南史韋睿傳鼎其孫也舊集不載按此亦廣耳目以察賊者用於鞫情之術則以中其忌諱故能使之首服也吕元膺栁公綽附唐吕元膺鎮嶽陽因出遊覽有喪輿駐道左男子五人衰服隨之元膺曰逺葬則汰近葬則簡此必詐也亟令左右搜索棺中皆兵刃乃擒之詰其情對曰欲過江劫掠故假為喪輿使渡者不疑又有同黨數輩已在彼岸期集悉捕獲以付法舊不著出處按蘇無名察盜之術正與元膺察賊相類栁氏叙訓有一事云栁公綽為襄陽節度使嵗歉鄰境尤甚有齊衰者哭且獻狀曰遷三世十二喪于武昌為津吏所遏不得出公綽覽之即命軍候擒其人破其柩皆實以稻米蓋葬於歉歲不應并舉三世十二喪故知其詐耳雖非劫取者而與元膺搜輿事頗相類也故附著之然議者以為閉糴非美不足為法令但取其明察慮有他姦故著為察賊之鑒耳張詠張詠尚書知江寧府有僧陳牒出憑詠據業熟視久之判送司理院勘殺人賊翌日羣官聚聼不曉其故詠乃召問為僧幾年對曰七年又問何故額有繫巾痕即惶怖服罪蓋一民與僧同行於道中殺之取其祠部戒牒自披剃為僧也見李畋虞部所撰忠定公語録按善察賊者必有以識之使不能欺也善鞫情者必有以證之使不可諱也詠實兼此二術矣可不謂之明乎喬某喬某虞部知果州西充縣時有強寇夜出剽掠罪人久不獲民或爭財而訟於庭某察其物色有異乃曰是必前日盜也收詰之果服見吕大監正字所撰墓志某華隂郡人失其名按昔魯兩生有大臣節而史失其名然迹之著不可掩也今江某之核姦喬某之察賊其事必傳矣雖失其名亦何憾哉迹賊司馬恱已見釋寃門按此與髙湝留靴之術同但彼譎而此正耳魏昶唐中書舍人郭正一破平壤得一髙麗婢名玊素極姝艷令専知財物庫正一夜須漿水粥玉素遂毒之良久覔婢不得又失金銀器四十餘事敕令捕賊鼎沸三日長安萬年尉石良有主帥魏昶請喚舍人家奴取少年端正者三人布衫籠頭又傳衛士四人問十日以來何人曽覔舍人家衛士云有投化髙麗留書與舍人捉馬奴書見在取驗之但言金城坊中有一空宅更無他語昶乃往金城坊應空宅並搜之果至一宅封鎖甚密即時打開婢及投化髙麗皆在乃是投化髙麗與捉馬奴藏之勑斬於東市舊不著出處按唐書郭正一傳云正一與郭代舉魏元同岑長倩並相髙宗唐平章事自正一等始正一為中書舍人當出征髙麗酷吏周興誣而殺之非為婢所毒也其征髙麗者有郭待封乃孝恪之子武將其後乃以中書舍人副薛仁貴伐吐蕃敗績貶死附見薛仁貴傳中亦無為婢所毒事此蓋小說所載傳聞繆說不足信者姑取其事之迹可也按昶喚舍人家奴取少年端正者三人布衫籠頭欲以譎取之也又傳衛士四人問十日以來何人曽覔舍人家欲以迹求之也雖兼用二術然譎賊不效而迹賊效矣譬猶得雀者網之一目而不可以一目之網捕雀也昶雖小人而善捕賊與蘇無名董行成類矣特著其事以勸能者不為無補也劉崇龜巳見釋寃門府從事已見釋寃門桑懌虞詡附桑懌崇班初以右班殿直為永安縣巡檢明道末京西旱蝗有惡賊二十三人樞密院召懌至京師授以賊姓名懌曰盜畏吾名必潰潰則難得矣宜先示之以怯至則閉柵戒軍吏不得一人輒出居數日其下不知其為數請出自效輒不許夜與數卒服盜服迹盜所嘗行處入民家老小皆走獨一媪㽜為治飲食如事羣盜懌歸閉栅三日復往自携具就媪饌而以餘遺媪媪以為真盜乃稍就與語及羣盜媪曰彼聞桑殿直來皆遁去近閉營不出知其不足畏今皆還矣某在某處某在某所懌又三日往厚遺之遂以實告曰我桑殿直也為我察其實勿泄後三日復來又三日而往媪盡得居處之實以告懌明日部分軍士盡擒諸盜其尤強梁者懌自馳馬取之見夲傳按懌先閉柵譎賊使不走乃因媪迹賊使不覺然後悉擒之皆兵法也後漢虞詡為朝歌長時賊寧季等數千人攻殺長吏屯聚連年州郡不能禁詡到官既誘令劫剠伏兵殺之又潜遣貧人䏻縫者傭作賊衣以采線縫其裾為識有出市里者吏輒擒之賊遂駭散咸稱神明出後漢書本傳是亦兵法也然於迹賊之術悉皆有所考焉顧用者如何耳故並著之以備采擇也譎賊蘇秦蘇秦在齊大夫與之爭寵使人刺之不殊而去求賊不得秦且死謂齊王曰臣死之後王車裂臣以狥于市曰蘇秦為燕作亂于齊如此則刺臣之賊必得矣王如其言賊果出乃誅之舊出春秋後語陸雲晉陸雲為浚儀令民有被殺而主名不立者雲録其妻而無所問十許日遣出密令人隨其後謂曰不出十里當有男子候之與語便縳來既而果然問之具服云與其妻同謀殺之聞得出欲共語畏憚近縣逺相要候人皆歎服舊出晉書本傳按此蓋察其妻有姦狀故拘録之以譎姦人使疑而出也楊津後魏楊津為岐州刺史有武功人齎絹三百匹去城十里為賊所劫時有使者馳騎而至被劫人因以告之使者到州以狀白津津乃下教云有人著某色衣乘某色馬在城東十里被殺不知姓名若有家人可速收視一姥哭而出云是己子遣騎追收并絹俱獲舊出北史楊播傳津其子也按此與髙湝留靴紿嫗術同彼以靴為迹此以衣與馬之色為迹而皆用譎取之其異者彼實得靴則主于迹而兼以譎此空言衣與馬之色則主于譎而示以迹也栁慶後周栁慶領雍州别駕有胡家被劫郡縣按察莫知賊處鄰近被囚者甚衆慶以賊是烏合可以詐求之乃作匿名書榜官府門曰我等共劫胡家徒旅混雜終恐泄露今欲首服懼不免誅若聽先首免罪便欲來告慶乃復施免罪之牒居二日廣陵王欣家奴面縳自告牒下因此盡獲黨與舊出北史栁蚪傳慶其弟也蔣常張松附已見釋寃門按常之留媪蓋用陸雲録妻之術譎賊使出乃可捕獲也唐張松夀任長安令時昆明池邉有劫殺賊勑限十日捕獲督責甚峻松夀至行劫處撿蹤見一老姥路傍賣飯即以從騎䭾歸縣中供酒食三日却䭾送舊處令一腹心人密往伺察之有人來問賊事即收縳果有一人問曰眀府若為推勘遂擒送縣一問欵服并贓皆獲舊不著出處此又用蔣常留嫗之術者也劉崇龜已見釋寃門按賊逃匿者譎使出焉免于追捕之煩其術固不可廢然人之逃匿既可譎取之矣則情之隱匿亦可譎取之也擲姦鈎慝是譎取其情者也故彼兩門又與鞫情之術相似也折獄龜鑑卷七
