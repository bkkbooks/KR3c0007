body:
  text: 折獄龜鑑卷六宋鄭克撰核姦周䊸後漢周䊸遷召陵侯相廷掾憚䊸嚴明欲損其威乃晨取死人斷手足立寺門䊸聞便往至死人邊若與死人共語狀隂察視口眼有稻芒乃密問守門人曰悉誰載藁入城門者對唯廷掾耳又問鈐下外頗有疑吾與死人語者否對曰廷掾疑君乃收廷掾考問具服不殺人取道邊死人後人莫敢欺者舊出後漢書本傳語尸事又見擲姦門按䊸視口眼有稻芒者跡也若與死人共語者譎也以跡推核其事以譎發摘其情乃復密問以相參考而姦人得矣是故後人莫敢欺也國淵王安禮葛源二事附魏國淵為魏郡太守時有投書誹謗太祖者太祖疾之必欲知其主名淵請留其本書而不宣露書中多引二京賦乃敕功曹曰此郡既大今在都輦而少學者其簡開解少年欲遣就師功曹差三人臨遣引見訓以所學未及二京賦此博物之書也世人忽略少有其師可求能讀者從受之旬日得能讀者遂往受業因請使作箋比方其書似出一手收問服罪舊出魏志本傳按王安禮右丞知開封府時或投書告一富家有逆謀都城惶恐安禮不以為然後數日有㫖根治搜驗富家事皆無跡因問曽與誰為仇對以數月前鬻狀馬生者有所貸而弗與頗積怨言於是密以他事綰馬生至對欵取匿名書校之字無少異訊鞫引伏此乃用淵核姦之術者也見近時小說葛源郎中為吉水令時捕與寡婦間語者驗其對事已見察姦門是亦用淵核姦之術者也韋臯陳執方附唐韋臯鎮劒南有逆旅停止大賈資貨萬計因病毒之十隱七八遂以致富臯知其事未及發覺復以北客蘇延病死報于府延太原人商販蜀川使驗其簿已被換易尋究經過辭多異同遂敕店主與同店者立承欺隱凡數千緡諸胥分受者二十餘人悉以付法由是劔南客免橫死舊不著出處按陳執方大卿知均州時漢上舟子數溺商旅取貨財輒以險為解執方捕案悉置于法因取近灘數家除其徭役使表水險涉者因此得不橫死與臯核姦之術頗同也見王安石丞相所撰墓志張輅已見懲惡門獄吏江南大理寺嘗鞫殺人獄未能得其實獄吏日夜憂懼乃焚香懇禱以求神助因夢過枯河上髙山寤而思之曰河無水可字山而髙嵩字也或言崇孝寺有僧名可嵩乃白長官下符攝之既至訊問亦無姦狀忽見屨上墨汚因問其由云墨所濺使脫視之乃墨塗也復詰之僧色動滌去其墨即是血痕以此鞫之僧乃服罪見吳叔校理祕閬間談按可嵩事與馮昌類矣然未見姦狀時若不著血汚之屨將何以核其姦乎蓋獲冥助如蕭儼禱神而雷震牛死非智算所及也和凝嘗曰潔誠齊戒祈獲祐於上穹鋭意典墳思有得於邃古兼此二者用以折獄諒無難矣王利王利屯田通判滄州時遣三卒至都下二人者共害一卒取其齎裝反以卒逃狀聞利疑其姦密遣吏自郡至都以物色求之得其實二人即服罪見尹洙龍圖所撰墓志按利所以疑其姦者卒之色辭必有異也君子固不可逆詐亦不可受欺疑而核之理當然也張式李景略附張式郎中知夀州民有縊其妻以自殺告者吏受賕實之式窮詰立服人稱其明見王安石丞相所撰墓志按唐李景略初辟李懷光朔方節度府巡官五原將張光殺其妻以資市獄前後不能決景略核實論殺之既而有若女厲者進謝廷中如光妻云出唐書本傳舊集不載式之核姦頗亦類此且人縊之與其自縊傷迹有異驗則知矣吏既受賕以非為是必於驗狀有可疑者茍能聽察以理窮詰彼雖巧詐將何所逃人稱其明不為過也凡附著之事或以後證前或以古明今隨事變文無定例也葛源葛源郎中提㸃湖北刑獄時鄂州崇陽大姓與人妻謀殺其夫而州受賕出之源使再劾劾者又受賕獄如初而源終以為不直其弟訴于轉運使雖他在事者亦莫不為寃遂親往鞫問不復置獄卒得其姦賕狀論如法見王安石丞相所撰墓志按此蓋布耳目察民事而先知其為姦受賕者故再劾不得其情而終以為不直親往鞫問然後得之罪狀既明議者自服監司之職當如是也李兌李應言附李兌尚書知鄧州有富人搏其僕至死繫頸棄井中以自縊為解兌曰投井固不自縊自縊豈復投井此必吏受賕教富人使不承耳已而案之果然兌熙寧五年終於工部尚書按李應言諫議為開封府判官時京師富民陳氏殺傭作者而誣以自經死事覺輒逃匿不獲應言指其豪橫交結權要請嚴捕之及出知河陽而事遂緩應言慶厯三年終於右諫議大夫二事並見本傳此皆善核姦者唯陳氏幸免為可惜也朱夀昌侯詠附朱夀昌中散知閬州大姓雍子良屢殺人挾財與勢故得不死時又殺人賕其里民使出就吏獄具覺其姦引囚屏左右訊之囚對如初夀昌告之曰爾以死代人母令有悔吾聞子良與汝錢十萬納汝女為子婦許嫁其女汝家有之乎囚色動又告之曰汝且死書劵抑汝女為婢指十萬為傭直而嫁其女於他人汝將奈何囚悟泣下乃以實對立取子良置於法一郡以為神明見曾肇內翰所撰墓志按大理評事侯詠為虢州録事參軍時土豪趙寶者殺人誣其傭令代死且賕吏成其獄詠辨狀立正之見尹洙龍圖所撰墓志與子良事頗相類也一賕獄吏使以傭代一賕里民使以身代其為姦等耳詠能辨獄吏受賕之狀而正其罪夀昌能探里民受賕之情而得其實是皆善核姦者也范純仁范純仁丞相知河中府時録事參軍宋儋年㑹客罷以疾告是夜暴卒蓋其妾與小吏為姦也純仁知其死不以理遂付有司案治會儋年子以喪柩歸移文追驗其尸九竅流血睛枯舌爛舉體如漆有司訊囚言置毒鱉胾中純仁問鱉胾在第幾巡豈有中毒而能終席耶必非實情命再劾之乃因客散醉歸置毒酒杯中而殺之此蓋罪人以儋年不嗜鱉而為坐客所共且其後巡數尚多欲為他日翻異逃死之計爾見范忠宣公言行録按凡善核姦者必善鞫情也若不得實情則後必翻異而姦人得計矣推核之際戒在疏略是故漢史稱嚴延年之治獄也文案整密不可得反雖酷吏無足道然於此一節亦有取焉耳李行簡李行簡給事初為彭州軍事推官富民陳子美者繼母詐為父遣書逐出之纍訴不得直轉運使檄行簡劾正其事及代還子美乃以金五百兩餞行簡怒不納感泣而去郎簡郎簡侍郎嘗知竇州有縣吏死子幼贅壻僞為劵收其田後子長屢訴不得直因訴于朝下簡劾治簡以舊案示之曰此爾婦翁書耶曰然又取僞劵示之弗類也彼劾正繼母詐為父遺書者亦必有以核之惜乎史辭太簡故失其傳耳案弗類也為敘事之文彼劾正以下乃論斷之語原本一佚其後半假一佚其前半假而合為一條誤也劉沆劉沆丞相知衡州時有大姓尹氏欲買鄰人田莫能得鄰人老而子幼乃僞為劵及鄰人死即逐其子二十年不得直沆至又出訴尹氏出積嵗所收戶抄為驗沆詰之曰若曰不頃戶抄案若曰不頃句有誤疑當作若田百頃豈特收此乎始為劵時嘗問他鄰乎其人固多在者可以取為證也尹氏不能對遂服罪按賣田問鄰成劵會鄰古法也使當時法不存則將何以核其姦乎近年有司茍取小快遂改此法未之思歟尹洙尹洙龍圖嘗知河南府伊陽縣有女幼孤而冒賀氏産者鄰人證其非是而沒之官後鄰人死女復訴且請所沒産久不能決洙問汝年幾何曰三十二乃檢咸平年籍二年賀死而妻劉為户詰之曰若五年始生安得賀姓耶女遂服以上四事並見本傳程皓程皓察院知澤州晉城縣時有富民張氏子其父死未幾晨起有老父在門曰我汝父也來就汝居具陳其由張氏子驚疑莫測相與詣縣請辨之老父曰業醫逺出治疾妻生子貧不能養以與張氏某年月日某人抱去某人見之皓謂嵗月久矣爾何說之詳也老父曰某歸而知之書于藥法冊後因懷中取冊以進其記曰某年月日某人抱兒與張三翁皓問張氏子爾年幾何曰三十六爾父在年幾何曰七十六謂老父曰是子之生其父年四十人已謂之三翁乎老父驚駭服罪聞之前輩按凡為巧詐必有缺漏推核已至姦欺自露如檢户籍以視孤女所冒之非校年齒以驗老父所記之妄皆此術也唯盡心者則能之耳吳元亨范諷附同州馮翊令吳元亨為政不茍縣與華隂接境以漆沮為界中間洲上有美田民與相爭之五十餘年吏不能決元亨檄華隂令㑹境上盡案兩鄉之籍遍履其田執度以度之皆得其實自是民不敢復爭時人稱之見司馬光丞相所撰墓志按范諷給事嘗知鄆州平隂縣㑹河決王陵掃水去而土肥阡陌不復辨民數爭不能決諷為手書分别疆理民皆持去以為定劵自是無復爭者見本傳元亨事頗類此核得其實姦無所容是省獄訟之術也任術延州臨真尉任術有智數監司使治地訟其地山險不可登陟由此數為訟者所欺術呼訟者告之曰吾不忍盡爾當貰爾半爾所有之田兩畝止供一畝謹不可欺欺則盡覆入官矣民信之盡其所有供半既而指一處覆之文致其參差處責之曰我戒爾勿欺何為見負今盡入爾田矣凡供一畝者作兩畝收之更無一犂得隱見沈括內翰筆談按此乃兵法詐謀之類也偶然使中遂以為竒已泄之機安可再用民若狡猾將反見欺夫欲核姦譎不若正履而度之者是也王罕吕惠卿附王罕大卿初知常州宜興縣時縣臨泖湖民嵗訴水多幸免罕因農休召封內父老各列其田之髙下繪而為圖明年既得訴狀乃親往按之其臨一鄉輒曰某户輸可免某户不可免衆環視無一辭是時范仲淹知潤州乃奏罕檢田法下諸路見王圭丞相所撰墓志按吕惠卿參政治縣法災傷門云要使實被災者不至枉納分數而不被災者莫敢妄訴以求幸免則宜居常按視縣圖究知鄉村地形髙下仍以小圖子分為九等出入下鄉復更窮按有不盡者隨手改正遇有水旱於未收刈前先行巡省已知被災人户田土多寡之大數其積水所占年例災傷田土皆先度見頃畝數目至披訴時將狀內頃畝比對即免夾帶之弊罕檢田法殆亦類此歟是皆以正核姦者也李南公李南公尚書初知長沙縣諸村各有詭名户稅存而户亡每年户長代納之南公悉召其豪右謂曰此田不過汝曹典買耳與汝一月限為我推究出不然汝曹均分輸納及期盡得其人使之承稅聞之士林按詭户之稅非獨豪右作此弊也蓋其鄉司相與為姦今専責豪右而鄉司獲免殆亦於理有未盡歟善核姦者宜并按之抑又有說焉若専令鄉司任責則豪右愈更得計必以厚賂使填逋缺稅數之外物力所減固亦多矣內外相比以欺縣官何由可得其實乎然則責豪右宜急責鄉司宜緩南公之意當在此也擲姦案此門原本缺標題今補黃霸李崇于仲文張詠三事附前漢時潁川有富室兄弟同居其婦俱懷妊長婦胎傷匿之弟婦生男奪為己子論爭三年不決郡守黃霸使人抱兒於庭中乃令娣姒競取之既而長婦持之甚猛弟婦恐有所傷情極悽愴霸乃叱長婦曰汝貪家財固欲得兒寧慮或有所傷乎此事審矣即還弟婦兒長婦乃服罪舊出風俗通按疑獄集又載一事與此相似後魏李崇為揚州刺史部民茍泰有子三嵗失之後見在郭奉伯家各言己子並有鄰證郡縣不能決崇乃令二父與兒各别禁數日忽遣吏謂曰兒已暴死可出舉哀泰聞之悲不自勝奉伯嗟歎而已殊無痛意遂以兒還泰出北史本傳此乃用霸擲姦之術者也别載一事亦頗相似後周于仲文為安固太守有任杜兩家各失牛後得一牛兩家俱認久不能決仲文令各驅其家牛羣至乃放所認者牛遂向任氏羣中又使人微傷其牛任氏嗟惋杜氏自若遂呵杜氏服罪而去出北史于栗磾傳仲文其八世孫也此亦用霸擲姦之術者也隋襄州總管裴正云凡推事有兩一察情一據證審其曲直以定是非據證者核姦用之察情者擲姦用之蓋證或難憑而情亦難見於是用譎以擲其伏然後得之此三事是也于仲文放牛事又見懲惡門近時小說亦載一事云張詠尚書鎮蜀日市有二嬰孩同戲其一為奔馬所斃孩母二人競認生者為己子私證無所驗有司不能決詠佯怒謂二嫗曰若當時二子盡斃馬足爾亦何所爭耶乃令健卒取兒將擲於井中一母前走急往護之一母後行其意差懶遂以子還前行者此乃妄人傅會為之也夫始生而奪之者兒固未能識母也三嵗而失之者兒或已忘其父也二嬰孩同戲縱未能言當已識母非歷時長久亦不應便忘且于仲文放所認牛向任氏羣而杜氏服罪若放所認兒則必向其母而非母者服罪矣豈得云私證無所驗而復用擲姦之術佯為擲井之怒乎無足取者聊附之耳薛宣前漢時臨淮有一人持匹縑到市賣之道遇雨披覆後一人至求共庇廕雨霽當别因相爭鬪各云我縑詣府自言太守薛宣核實良久莫肯首服宣曰縑直數百錢何足紛紜自致縣官呼騎吏中斷縑人各與半使追聽之後人曰太守之恩縑主乃稱寃不已宣知其狀詰之服罪舊出風俗通按此與黃霸抱兒之術同也薛宣用於斷所爭之縑于仲文用於傷所認之牛以其事異而理同故爾後有善擲姦者則霸之術猶可用也周䊸巳見核姦門按䊸察死人狀而得稻芒馬因以求為姦之迹是核姦者也與死人語而使疑怪焉因以動懷姦之心是擲姦者也核姦以正擲姦以譎此其所以異也崔思兢己見辨誣門莊遵己見釋寃門安重榮巳見懲惡門按擲姦鈎慝之術皆與鞫情相似而必用譎焉盡心君子亦不可忽也察慝髙柔魏髙柔為廷尉護軍營士竇禮近出不還營以為亡表言逐捕沒其妻盈及男女為官奴婢盈稱寃自訟莫有省者乃詣廷尉柔問何以知夫不亡盈泣對曰夫非輕狡不顧室家者又問汝夫不與人有讎乎曰夫良善與人無讎汝夫不與人交錢物乎曰嘗出錢與同營士焦子文求不得時子文適坐事繫獄柔乃召問所坐語次問曾舉人錢否對曰單貧不敢舉人錢察其色動遂復問汝曾舉竇禮錢何言不耶子文怪知事露應對不次柔詰之曰汝已殺竇禮便宜早服子文於是叩頭服罪舊出魏志本傳按慝與姦異者姦必巧詐慝唯隱諱如釘殺其夫而云遭火燒死是巧詐也如舉竇禮錢而云單貧不敢是隱諱也禮近出不還疑為人所殺故首問其讎次問交錢物者嘗出錢與焦子文而求不得或緣嫌恨以致此禍於是察其色動辭對不次則隱諱之情得矣故詰之服罪是善察慝者也胡質魏胡質為常山太守遷任東莞士盧顯為人所殺質曰此士無讐而有少妻所以死乎悉集其比居少年書吏李若見問而色動遂窮詰情狀若即自首罪人斯得舊出魏志本傳按髙柔知竇禮無讐而與人交錢物所以死也故察得焦子文胡質知盧顯無讐而有少妻所以死也故察得李若夫人之相殺害者茍無讐恨若不因財則必因色推此二者足以得其人矣然所以察之者皆不過色與辭之間亦唯聰明故不可欺也蔡髙蔡髙調福州長溪尉民有夫婦皆出而盜殺其守舍子者髙亟召里民畢會環坐而熟視之指一人曰此殺人者也訊之果服見歐陽修參政所撰墓志按民子被殺無所猜執則其夫婦必皆良善而於同里亦無仇怨忍殺其守舍子者乃凶殘人也凶殘之人氣貌當異故不待問之而色動詰之而辭屈唯環坐而熟視之其人已得矣髙之明察尤可稱也昔孟嘉在坐禇裒未識而庾亮使裒自求之眄睞良久乃指嘉曰此人小異得無是乎雖善惡有殊而物理何别髙之視裒諒無愧焉吕公綽吕公綽侍讀知開封府有營婦夫戍未還夜盜入舍斷腕而去主名不立都人喧言駭異公綽謂非其夫仇不宜快意戕害至此亟遣馳詰其夫果獲同營韓元者具姦狀伏誅見王圭丞相所撰墓志按此蓋知營婦為人非不良者故特疑其夫仇戕害之也既得其事乃察其實彼之隱慝將何所遁斯可以謂之明矣證慝孫寶漢孫寶為京兆尹有賣􅠑散者偶與村民相逢擊落􅠑散盡碎村民認填五十枚賣者堅言三百枚因致喧爭寶令别買􅠑散一枚稱見分兩乃都稱碎者紐折立見元數衆皆歎服舊不著出處按魏太祖時孫權致巨象欲知其斤重訪之羣下莫能出其理鄧哀王冲方數嵗請致象大船之上刻水痕所致而稱物以載之校可知也與稱􅠑散之理同矣寶以􅠑散一枚之重校碎者之重其枚數立見冲以載象所至之痕校稱物之痕而斤重可知皆其智有餘也夫片言可以折獄者何其為人信服至於如此哉蓋以智有餘而言中理故爾欺誑之慝以此為證而不可諱矣彼焉得不服耶是故片言可以折獄也張舉張舉吳人也為句章令有妻殺夫因放火燒舍稱火燒夫死夫家疑之訴于官妻不服舉乃取豬二口一殺之一活之而積薪燒之活者口中有灰殺者口中無灰因驗尸口果無灰也鞫之服罪舊不著出處按和凝所著二十九條皆以時代為次其書舉事在吳人之末晉人之前豈非孫氏之臣乎但先既云吳廢帝孫亮則此宜云吳張舉不當於姓名下言吳人耳句章屬㑹稽郡按孫寶以􅠑散一枚之重為證而誑言三百枚之慝顯矣張舉以死豬口中之灰為證而誑言夫燒死之慝顯矣是謂慝未顯者以物證之則不可諱也然則莊遵守尸而首有蠅集為核姦有效豈若張舉驗尸而口無灰入為證慝盡理乎傅琰許宗裔附宋傅琰為山隂令有兩人爭雞琰問雞早何食一云粟一云豆乃殺雞破嗉而有粟焉遂罰言豆者舊出南史本傳按釋寃門許宗裔之驗贓也問紬線胎心用何物一云杏核一云瓦子開見杏核而罪言瓦子者其術蓋本於此顧憲之于仲文附宋顧憲之元徽中為建康令時有盜牛者被主者所認盜者亦稱已牛二家辭理等前後令莫能決憲之至覆其狀謂二家曰無為多言吾得之矣乃令解牛任其所去牛徑還本主宅盜者始伏其辜發姦擲伏多如此類時人號曰神明舊出南史顧凱之傳憲之其孫也按證以人或容僞焉故前後令莫能決證以物必得實焉故盜者始服其罪于仲文放牛事巳見擲姦門與此正相類其異者彼之家逺而有牛羣此之家近而無牛羣也隨事制宜然後放之理無異焉李惠傅琰附李惠為雍州刺史人有負鹽負薪者同釋重擔息於樹隂二人將行爭一羊皮各言藉背之物惠遣爭者出顧州綱紀曰以此羊皮拷知主乎郡下以為戲言咸無應者惠令人置羊皮席上以杖擊之見少鹽屑曰得其實矣使爭者視之負薪者乃伏而就罪凡所察究多如此類由是吏民莫敢欺犯舊出北史本傳按傅琰之為山隂令也有賣糖姥與賣針姥爭絲一團琰令掛絲鞭之有少鐵屑焉乃罰賣糖姥鞭絲擊皮事異理同皆以物為證者也慕容彥超漢慕容彥超帥鄆有役人盜食櫻桃主吏白之不服彥超慰諭曰汝輩豈敢盜吾所食之物主吏誣執不須憂懼各賜以酒密令入藜盧散於酒中既飲即吐有櫻桃在焉於是服罪此蓋和㠓所聞之事按俗有入口無贓之語此說足以破之然事既細微譎亦刻薄何足道哉歐陽煜歐陽煜都官知端州有桂陽監民爭舟相毆死獄久不決煜出囚坐廷中去其桎梏而飲食之訖還于獄獨留一人留者色動煜曰殺人者汝也囚不知所以然曰吾視食者皆以右手持匕汝獨以左今死者傷右肋此汝殺之明也囚泣曰我殺之不敢以纍他人見歐陽修參政所撰墓志按煜以觀其驗狀云傷右肋死故因飲食視所用手彼獨左手持匕者乃是毆殺之人也以此為證其辭自屈與錢維濟辨誣之術同矣茍非盡心察獄則亦豈能然耶王璩王璩寺丞嘗為襄州中盧令有賊繫獄訊治久之不能得情偶於賊橐中得故簡而揭示之乃房陵商人道為賊所掠者賊即引伏不爾幾脫見王圭丞相所撰墓志按此非知算所及偶然得之耳亦可見璩之治獄能盡其心鞫獄之情昔人賴於證也歐陽曄以右肋之傷為證而毆殺者辭窮王璩以橐中之簡為證而劫掠者情得證慝之術焉可忽哉王曾曾諤附王曾丞相少時謁郡僚有爭負郭田者封畛既泯質劑且亡未能斷決曾謂驗其稅籍曲直可判郡將從之其人乃服見沂公言行録按界至不明故起爭訟契書不存故難斷決唯有稅籍可為證據辭與籍同者其理直也辭與籍異者其理曲也曲直既判焉得不服大觀間有曾諤朝議者知越州諸暨縣四明富民初唯一子後通其僕之妻又生一子而收養之年十六富民亡子與母謀以還其僕後數年所生母與嫡母皆死乃歸持服且訟分財纍年不決監司委諤推治歷訊不能屈因索本邑户版驗其丁齒而富民嘗以幼子注籍遂許其分見近時小說此亦以籍為證者也爭田之訟稅籍可以為證分財之訟丁籍可以為證雖隱慝而健訟者亦聳懼而屈服矣此證慝之術所以可貴也韓億韓億參政知洋州時土豪李甲者兄死迫嫁其嫂因誣其子為他姓以専其資嫂歷訴于官甲輒賂吏使掠服之積十餘年其訴不已億視舊牘未嘗引乳醫為證一日盡召其黨以乳醫示之衆無以為辭寃遂辨見本傳嘗云推事有兩一察情一據證固當兼用之也然證有難憑者則不若察情可以中其肺腑之隱情有難見者則不若據證可以屈其口舌之爭兩者迭用各適所宜也彼誣其子為他姓者所引之證想亦非一獨未嘗引乳醫則其情可見矣故盡召其黨以乳醫示之既有以中其肺腑之隱又有以屈其口舌之爭則衆無以為辭而寃遂辨不亦宜乎程皓程皓察院初為京兆府鄠縣主簿民有借其兄宅以居者發地中藏錢兄之子訴曰父所藏也令言無證左何以決之皓曰此易辨耳問兄之子曰爾父藏錢幾年矣曰二十年遣吏取千錢視之謂曰今官所鑄錢不五六年則遍天下此錢皆爾父未居前數十年所鑄何也按宋文鑑及伊洛淵源録皆作爾父藏錢幾何時矣曰四十年矣彼借宅居幾何時矣曰二十年矣即遣吏取錢十千視之謂借宅者曰今所鑄官錢不五六年即遍天下此錢皆爾父未藏前數十年所鑄何也文義較明晰其人遂服令大竒之見程頤侍講所撰行狀按旁求證左或有僞也直取證驗斯為實也彼言地中藏錢是其父所藏者取錢驗之皆古錢也又豈能選擇古錢藏之耶以此為證妄訴明矣是故其人不敢不服也李南公李南公尚書知長沙縣時有鬪者甲强而乙弱各有青赤痕南公召使前自以指揑之曰乙真而甲僞也訊之果然蓋南方有櫸栁以葉塗膚則青赤如毆傷者剝其皮橫置膚上以火尉之則如棓傷者水洗不落但毆傷者血聚則硬而僞者不然南公乃以此辨之也聞之士林按鬪毆之訟以傷為證而有此僞豈可不辨故特著焉李處厚太常博士李處厚知盧州真縣嘗有毆人死者處厚往驗尸以糟胾灰湯之類薄之都無傷迹有一老父求見曰邑之舊書吏也知驗傷不見迹請用赤油繖日中覆之以水沃尸迹必立見處厚如其言傷迹宛然自此江淮間往往用其法見沈括內翰筆談按凡據證折獄者不唯責問知見辭欵又當檢勘其事推驗其物以為證也則驗傷者宜盡心焉故書南公揑痕事又以處厚沃尸事繼之也折獄龜鑑卷六
