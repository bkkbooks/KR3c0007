body:
  text: 折獄龜鑑卷二宋鄭克撰釋寃下孔循范正辭趙稹薛向三事附後唐孔循以邦計貳職權領夷門軍府事長垣縣有四盜鉅富及敗而捕繫者乃四貧民也葢都虞候者郭從韜之僚壻與推吏獄典同謀鍜成此獄法當棄市循親慮之囚無一言領過蕭墻而乃屢顧因召問之云適以獄吏高其枷尾故不得言請退左右細述其事即令移於州獄俾郡主簿鞫之受賂者數十人與四盜俱伏法四貧民獲雪此葢和㠓所聞五代時事按廵捕之吏或縱盜而捕繫平民以應命或失盜而捕繫平民以逃責或求盜而捕繫平民以希賞若獄吏與之為市則寃濫豈可勝言此在聽者察之耳孔循所察乃縱盜而捕繫平民以應命者也又有三事失盜而捕繫平民以逃責者二求盜而捕繫平民以希賞者一今附於後云范正辭齊州人父勞謙正辭為江南轉運副使饒州民甘紹者積財鉅萬為羣盜所掠州捕得十四人獄具當死正辭按部至引問之囚皆泣下察其非實命徙他所訊鞫既而民有告羣盜所在者正辭潛召監軍王愿掩捕之盜遁去正辭即單騎出追及之賊控弦持矟來逼正辭以鞭擊之中賊雙目執之以歸按其姦狀伏法而前十四人皆得釋趙稹少師按宋史本傳稹以太子少傅致仕贈太子太保未拜少師疑有誤為益州路轉運使時卭州蒲江縣捕刼盜不得而官司反繫平民數十人楚掠强服且合其辭若無可疑者稹適行部意其有寃乃馳入縣獄盡得其寃狀釋出之已上二事並見本傳薛向樞密提㸃河北刑獄時深州武强縣有盜殺人而奪其財尉以失盜為負捕平人掠服之置贓於外以符其語向得而疑之親引問直其寃免死者六人正其尉故入之罪見呂大防丞相所撰墓誌此三者皆與孔循慮囚事類矣非有他術俱盡心察情故能釋寃也府從事廬陵歙縣二事附和㠓載玊堂閑話云近代有人因行商回見妻為人所殺而失其首既悲且懼以告妻族乃執壻送官不勝捶楚自誣殺妻獄既具府從事獨疑之請更加窮治太守聽許乃追封内仵作行人令供近日與人家安厝去處又問頗有舉事可疑者乎一人對曰某處豪家舉事只言殂却妳子五更初墻頭舁過凶器極輕似無物見瘞某處亟遣發之乃一女子首令囚騐認云非妻也遂收豪家鞫問具服殺妳子函首埋瘞以尸易囚之妻畜於私室壻乃獲免按此漢乾祐中王仁裕所説五代時事也頃聞一事與此相似又聞一事頗亦類此並附于後太平州有一婦人與小郎偕出遇雨入古廟避之見數人先在其中小郎被酒困睡至晩始醒人皆去矣嫂已被殺而尸無首驚駭號呼被執送官不勝考掠誣服强姦嫂不從而殺之棄其首與刀於江中遂坐死後其夫至廬陵於優戲場認得其妻諸伶悉竄捕獲伏法蓋向者無首之尸乃先在廟中之人也伶人斷其首易此婦人衣而携以去小郎之寃如此以無善疑從事故也然則贓證未明獄可遽决乎宣歙間有强盜夜殺一行旅棄尸道上携其首去將曉一人繼至而踐其血亟走避之尋被追捕繫獄半年不决有司切欲得首結案乃嚴督里胥遍行搜索會一丐者病卧窑中即斬以應命囚亦久厭考掠遂伏誅後半年强盜始敗于儀真獄成騐所斬首乃瘞于歙縣界彼里胥之濫殺與平民之枉死皆縁有司急於得首以結案也然則追責贓證可不審謹乎此皆政和中事可為典獄之戒故附著之發瘞事又見迹賊門許宗裔王蜀時有許宗裔守劒州部民被盜燈下識之迨曉告官捕獲一人所收贓物唯絲絇紬線而已宗裔引問縲囚訴寃稱是本家物與被盜人互有詞説乃命取兩家繰車以絲絇量其大小與囚家車􅤧同又問紬線胎心用何物一云杏核一云瓦子因令相對開之見杏核與囚欵同於是被盜人服妄認之罪廵捕吏當考决之辜指顧之問便雪寃枉舊不著出處騐贓事又見證慝門蕭儼南唐昇元格盜物及五緡者死廬陵豪民曝衣失新㓗衾服直數十千村落僻遠人罕經行以為其鄰盜之鄰人不勝楚掠遂自誣服詰其贓物即云散鬻於市無從追究赴法之日寃聲動天長吏以聞先主命員外郎蕭儼覆之儼齋戒禱神佇雪寃枉至郡之日天氣晴和忽有雷聲自西北起至失物家震死一牛剖其腹而得所失物乃是為牛所噉猶未消潰也出鄭文寶南唐近事舊集不載按此非智算所及蓋獲㝠助爾實至誠哀矜之效也高防邵曄梁顥二事附高防初事周世宗知蔡州時部民王乂為賊所刼捕得五人繋獄窮治贓狀已具將加極典防疑其枉取贓閲之召乂問所失衫袴是一端布否曰然防令校其幅尺廣狹不同疎宻有異囚乃稱寃問何故服罪曰不任捶楚求速死耳居數日獲其本賊而五人得釋防後事本朝終於尚書左丞見本傳按防校布事與許宗裔騐贓術同然所獲衫袴本非真贓若其不幸而疏宻廣狹如一則奈何茍於情理有可疑者雖贓證符合亦未宜遽决雍熙中邵曄諫議為蓬州録事參軍知州楊全性率而悍部民十三人被誣為刼盜悉寘于大辟曄察其枉白請再劾不聽乃取二人棄市餘械送闕下翌日果獲正盜全坐削籍為民曄賜緋魚授光禄寺丞見曄本傳景德中梁顥内翰知開封府時開封縣尉張易捕盜八人獄成坐流既决乃獲真盜御史臺劾問得實官吏皆坐貶責見當時詔令此乃但憑贓證不察情理而遽决之者也蓋贓或非真證或非實唯以情理察之然後不致枉濫可不鍳哉可不謹哉向敏中王晦叔附向敏中丞相判西京有僧暮過村舎求宿主人不許求寢於門外車箱中許之是夜有盜入其家携一婦人并囊衣踰墻出僧不寐適見之自念不為主人所納而强求宿明日必以此事疑我而執詣縣矣因亡去夜走荒草中忽墜眢井而踰墻婦人已為人所殺尸在井中血汚僧衣主人蹤跡捕獲送官不堪掠治遂自誣云與婦人姦誘以俱亡恐敗露因殺之投尸井中不覺失脚亦墜於井贓與刀在井旁不知何人持去獄成皆以為然敏中獨以贓仗不獲疑之詰問數四僧但云前生負此人命無可言者固問之乃以實對於是宻遣吏訪其賊食於村店有嫗聞其自府中來不知其吏也問曰僧某獄如何吏紿之曰昨日已笞死於市矣嫗嘆息曰今若獲賊如何吏曰府已誤决此獄雖獲賊不敢問也嫗曰然則言之無害彼婦人乃此村少年某甲所殺也吏問其人安在嫗指示其舎吏往捕并獲其贓僧始得釋一府咸以為神見司馬光丞相涑水紀聞按士之察獄茍疑其寃雖囚無寃詞亦不可遽决王晦叔丞相知潞州時有殺人獄已具晦叔察情非是而靣訊之其人自謂不獲真殺人者無免理終不自明僚屬皆言無足疑固留不决而宻以物色捕殺人者得之作辨獄記以戒理官見尹洙龍圖所撰神道碑此其終不自明與僧云無可言者類矣而皆不敢遽决卒能獲賊釋寃豈非盡心矜謹之效歟錢若水姜遵附錢若水為同州推官知州性褊急數以胷臆决事不當若水固爭不能得輙曰當陪奉贖銅耳已而果為朝廷及上司所駁州官皆贖論知州愧謝已而復然前後如此數矣有富民家小女奴逃亡不知所之奴父母訟於州命録事參軍鞫之録事嘗貸錢於富民不獲乃劾富民父子數人共殺女奴棄屍水中遂失其屍或為元謀或從而加功皆應死富民不勝榜楚自誣服具上州官審覆無反異皆以為得實若水獨疑之留其獄數日不决録事詣若水㕔事詬之曰若受富民錢欲出其死罪邪若水笑謝曰今數人當死豈可不少緩熟觀其獄詞邪留之且旬日知州屢趣之不能得上下皆怪之若水一日詣州屏人言曰若水所以留其獄者密使人訪求女奴今得之矣知州驚曰安在若水因密使人送女奴於知州所知州乃埀簾引女奴父母問曰汝今見汝女識之乎對曰安有不識也因從簾中推出示之父母泣曰是也乃引富民父子悉破械縱之其人號泣不肯去曰微使君之賜則某滅族矣知州曰推官之賜也非我也其人趣詣若水㕔事若水閉門拒之曰知州自求得之我何與焉其人不得入繞垣而哭傾家貲以飯僧為若水祈福知州以若水雪寃死者數人欲為之奏論其功若水固辭曰若水但求獄事正人不寃死耳論功非其本心也且朝廷若以此為若水功當置録事於何地邪知州歎服曰如此尤不可及矣録事詣若水叩頭愧謝若水曰獄情難知偶有過誤何謝也於是遠近翕然稱之未幾太宗聞之驟加進擢自幕職半嵗中為知制誥二年中為樞宻副使見涑水紀聞按若水雪富民寃猶非難能唯其固辭奏功乃見器識絶人宜乎知州歎服也姜遵為開封府右軍廵院判官時有二囚獄具將扺死遵察得其寃狀而出之故事雪活死囚當賞遵恐以累前獄吏乃不自言與若水固辭之意同矣然亦終於副樞見本傳王利向傅亮余良肱二事附王利郎中通判滄州時閲具獄有羣盜當就死利察其氣貌非作惡者宻訊之頗得其寃狀乃留不决且索境内後數日盡獲真盜賴免者七人見尹洙龍圖所撰墓誌按凡察獄者或以氣貌或以情理或以事迹此三者皆足以知其寃否也故以二事附于後云向傅亮少卿知管城縣時有殺人者獄已具傅亮察其情之非是將釋而更捕之佐吏咸以為不可後數日果得真殺人者見王珪丞相所撰墓誌此以情理察之者也余良肱大卿初為荆南司理叅軍有捕得殺人者既自誣服良肱獨以騐其屍與所用刃疑之曰豈有刃盈尺而傷不及寸白請詳捕果獲真殺人者見本傳此以事迹察之者也夫事迹有時偶合不可專用當兼察其情理氣貌故著此三事抑又有説焉治獄貴緩戒在峻急峻急則負寃者誣服受捕貴詳戒在茍簡茍簡則犯法者幸免惟緩於獄而詳於捕者既不失有罪亦不及無辜斯可貴矣明謹君子當如是也任中正任中正尚書知益州時眉州青神縣吏光寶家為盜所刼耆保言是夜雷延賦雷延誼皆不宿本舎縣尉即捕繫之縣吏王嗣等恣行考掠皆死於獄有頃本州獲刼光寶家賊七人始知賦誼之寃中正劾治其事以聞王嗣等四人並配𨽻他郡而優恤被枉之家見景德中詔令按縣尉茍欲逃責亦或捕繫平民况其事迹渉於疑似惟聽者宜察爾不當容吏恣行考掠使負寃而死也以未論决而貸長吏亦云幸矣此可為典獄之鍳故特著之也張保雍張保雍刑部為湖北轉運時鄂州置塲市民炭常時吏先印入抄文為足而實尚留民家未入比漕發乃直取載之州將挾情使税官按劾坐盜當死者十八人保雍自荆南單船六日夜入鄂州直其寃笞守吏數人而已見曽鞏舎人所撰神道碑張昷之張昷之待制提㸃淮南刑獄時楊崇勲知亳州恃恩恣橫知䝉城縣王申以公事忤之即械送獄昷之往問得其寃狀既出申又擿姦吏十數輩黥配之見本傳按市炭寃狀難明知縣寃狀易見然茍非勇於義者豈能奮而為之乎張堯佐强至附張堯佐宣徽初為筠州推官時吉州有道士與商人偕行夜宿郵舎飲而商人暴卒道士惶恐遁去為邏者所獲捕繫百餘人轉運使命堯佐覆治盡得其寃而釋之見本傳按强至省判初為婺州浦江令時有民與其母税邸舎於道客有過者暴病未及聞縣而死縣尉希功往執其母榜之其子惶恐即自誣殺客至為研核得其情而釋之見曾肇内翰所撰行狀夫逆旅之寃與道士類矣茍非盡心察情不能得其寃狀也程琳程文簡公琳知開封府會禁中大火延兩宮宦者治獄得縫人火斗已誣服而下府命公具案獄公立辨其非禁中不得入乃命工圖火所經而後宮人多而居隘其烓竈近版壁烓竈者行竈也字從圭淵圭切歲久燥而焚曰此豈一日火哉乃建言此殆天災也不宜以罪人上為緩其獄卒無死者公在府决事神速一歲中獄常空者四五見本傳按琳圖火所經處以辨掠服縫人之非是也火發於後宮而人多居隘茍欲根治豈無枉濫故曰此殆天災不可罪人於是為寛其獄豈有寃死者耶强至樂藹附强至祠部為開封府倉曹參軍時禁中露積油幕一夕火主守者法皆應死至預聽讞疑火所起召幕工訊之工言製幕必雜他藥相因既久得濕則燔府為上聞仁宗悟曰頃歲真宗山陵火起油衣中其事正爾主守者遂傅輕典亦見行狀按梁天監中長沙宣武王將葬而車府忽於庫失油絡欲推主者御史中丞樂藹曰昔晉武庫火張華以為積油幕萬匹必然今庫若有灰非吏罪也既而檢之果有積灰時稱其博物宏恕出南史樂藹傳此皆油中火發非人所致主者但有守䕶不謹之罪爾坐以失火則為寃死也錢治錢治屯田為潮州海陽令時郡之大姓某氏火迹其來自某家吏捕訊之某家號寃不服太守刁湛曰獄非錢令不可治問大姓得火所發牀足騐之疑里仇家物因率吏入仇家取牀足合之是仇家即服曰火自我出故遺其跡某家者欲自免也某家乃獲釋見歐陽修參政所撰墓誌按此蓋仇家放火也察其家號寃之情據仇家放火之證情理證驗灼然可見彼安得不服乎此善推事者故能釋寃也王珣王珣少卿知昭州有告偽為州印者繫獄久不决吏持其文不類州印珣為索景德以前舊牘視其印文則無少異誣者立雪蓋吏不知印文更時也見王珪丞相所撰墓誌按此非告者造誣也但見其不類而告之耳所印文書景德時事當索景德以前舊版校之吏不思此乃令久繫亦可憐哉唯珣盡心於是獲釋不然則必寃死矣劉賀劉賀承制初舉進士為懷州修武令民有醉不能歸者其侣得其衣以還其家醉人道斃喪家遂執以訴賀曰以衣還者非所以殺也由是得免段少連薦賀可為將自著作佐郎改内殿承制見呂大防丞相所撰墓誌按此非訴者造誣也但痛夫斃者故疑其殺耳若不遇賀以情理察之則彼負寃未易得釋也徐起徐起諫議知處州先有囚罪不應死而吏挾私傅致之囚伺間逸去後籍其家貲比起至乃自歸陳其寃起為請於轉運使更用他官覆治乃得免見本傳按囚之逸去以逃死也自歸訴寃有足矜者起若輙自治之則疑有心矯枉故請更用他官覆治而囚得免死合於公議矣此不唯善釋寃抑亦善避嫌也蕭貫此後五條並伸寃事蕭貫兵部知饒州時有撫州司法孫齊者高宻人初得嘉州司法先娶杜氏留里中更紿娶周氏與扺蜀罷歸周氏恚其紿欲訴於官齊斷髪誓出杜氏授歙州休寧尉得倡陳氏又納之代授撫州司法乃竊取周氏所生子秃秃合杜氏陳氏載之撫州未幾周氏亦與弟來欲入據其舎吏遮以告齊歸捽置廡下出偽劵曰若傭婢也何敢爾耶遂與陳氏殺秃秃瘞寢後周氏訴於州不直訴於轉運使不聽久之以布衣書里姓聨訴事行乞道上或教周訴于饒齊非貫所部受而行之轉運使始遣吏按鞫得實獄上更赦猶停齊官徙濠州見曾鞏舍人所撰秃秃記按寃枉弗釋非仁也寃抑弗伸非義也仁義之道並行而不悖者故於釋寃繼以伸寃也齊非所部而貫受訴豈侵官也葢曰天下之惡一也受朝廷寄委者皆當疾之也禮所謂無畏而惡不仁者貫近之矣不可與代庖人治庖者同議也轉運使聞其受訴始遣吏按鞫豈非有愧於貫而然歟是於名教不為無補故於伸寃首著之也蔡高蔡高調福州長溪尉縣媪二子漁於海而亡媪指某氏為仇告縣捕賊吏皆難之曰海有風波安知不水死乎雖果為仇所殺若不得尸則於法不可理高獨謂媪色有寃不可不為理也乃隂察仇家得其迹與媪約曰期十日不得尸則為媪受捕賊之責凡宿海上七日潮浮二尸至騐之皆殺也乃捕仇家伏法高端明殿學士襄之弟也見歐陽修參政所撰墓誌按人之寃訴苦於抑塞謂不得尸則不可理者豈非抑塞乎夫尉以捕賊為職茍不恤寃訴是不勤職業豈疾惡慕義之士所為乎雖然高受而理之亦有以也吏患不得尸而尸在海者皆隨潮出第恐不幸潮落他境耳故與媪約曰期十日不得尸則為媪受捕賊之責宿海上七日而潮浮二尸至此其至誠勤恤之效也屬吏所患何足慮是以卒能伸寃也陳薦王璩附陳薦資政初為益州華陽尉有盜殺人棄尸民田薦往騐尸旁一女子以移尸告田主即殺女子之母其家執以訴官縣欲文致殺二人罪免薦失盜之責薦曰是責何足避不可使有寃不報與囚自誣以死既而果獲真盜見本傳按田主殺女子之母固當死矣又使其自誣為盜殺人則盜之罪幸免而殺者寃弗報咎莫大焉乃以茍避簡書之責耳未為知輕重也寧可已任其責當使彼伸其寃豈非君子之用心乎大理寺丞王璩為越州剡縣尉時嘗出見尸覆水中治之或曰歲饑人多死未必有他故也治之寧免捕賊之罰耶卒使捕賊居數月州已批罰果得殺人者見王珪丞相所撰墓誌此其用心葢與高同皆君子不苟者也王罕王罕大卿知潭州時有老嫗病狂數邀知州訴事言無倫理知州却之則又悖詈但命徼者屏逐而已罕至復出訴左右欲逐之罕令引歸聽事召之叩階徐問其意嫗雖語言雜亂無次然時有可曉者乃本為人嫡妻無子其妾有子夫死為妾所逐家貲妾盡據之屢訴不得直因忿恚發狂罕為直其事盡以家貲還嫗見涑水紀聞顙呌子沈括内翰云世人以竹木牙骨之類為呌子置喉中吹之能作人言謂之顙呌子嘗有病瘖者為人所苦煩寃無以自言聽訟者試取呌子令顙之作聲如傀儡子粗能辨其一二乃獲伸此亦可記見筆談按狂者人所忽畧瘖者人所鄙棄有寃不伸斯亦可憐故著此二事使盡心君子得以為鑒也折獄龜鑑卷二
