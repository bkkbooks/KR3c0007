body:
  text: 折獄龜鑑卷八宋鄭克撰嚴明何武前漢時沛縣有富家翁資二千萬一男才數嵗失母别無親屬一女不賢翁病困思念恐其爭財兒必不全遂呼族人為遺書悉以財屬女但餘一劔云兒年十五付之後亦不與兒詣郡訴太守何武因録女及壻省其手書顧謂掾史曰女既强梁壻復貪鄙畏賊害其兒又計小兒正得此財不能全護故且付女與壻實寄之耳夫劔所以决斷限年十五智力足以自居度此女壻不還其劔當聞州縣或能明證得以伸理此凡庸何思慮深逺如是哉悉奪其財與兒曰弊女惡壻案弊字通典作蔽溫飽十年亦已幸矣聞者歎服舊出風俗通案此事亦見杜佑通典原本多誤字謹依通典改正按張詠尚書知杭州先有富民病將死子方三嵗乃命壻主其資而與壻遺書云他日欲分財即以十之三與子七與壻子時長立以財為訟壻持書詣府請如元約詠閲之以酒酹地曰汝之婦翁智人也時以子幼故此囑汝不然子死汝手矣乃命以其財三分與壻七分與子皆泣謝而去見李畋虞部所撰忠定公語録此正類何武事也夫所謂嚴明者謹持法理深察人情也悉奪與兒此之謂法理三分與壻此之謂人情武以嚴斷者壻不如約與兒劔也詠以明斷者壻請如約與兒財也雖小異而大同是皆嚴明之政也鍾離意後漢鍾離意為㑹稽北部督郵有烏程男子孫常與弟並分居各得田四十頃按四十頃通典作十頃並死嵗饑常稍以米粟給並妻子輒追計直作劵沒取其田並兒長大訟常掾史皆言並兒遭餓賴常升合長大成人而更爭訟非順遜也意獨議曰常身為伯父當撫孤弱而稍以升合劵取其田懷挾姦詐貪利忘義請奪其田畀並妻子衆議為允見通典不著出處舊集不載按聽獄者或從其情或從其辭夫常取並妻子田固有辭矣奈其懷挾姦詐貪利忘義之情何意獨以情責常是不從其辭而從其情也可不謂之嚴明乎陳矯魏陳矯為魏郡太守時繫囚千數有至厯年矯以為周有三典之制漢約三章之法今惜輕重之理而忽久繫之患可謂繆矣自覽罪狀一時論决出魏志本傳舊集不載按此蓋罪狀已定而輕重有疑吏不敢决者也使有罪不論無罪久繫自古以為患矣然拘文之吏每每如此繆可知也易曰君子以明慎用刑而不留獄矯自覽罪狀所謂明慎也一時論决所謂不留獄也若罪狀未定者慮有寃誣理當考核豈可取快一時耶君子於此宜盡心焉王敬則南齊王敬則為吳興太守録得一偷召其親屬於前鞭之令偷身長掃街路久之乃令舉舊偷自代諸偷恐為所識皆逃去境內以清出南史本傳舊集不載按偷之冒法初不畏罪設此二事令其厭苦庶或可戢也裴俠後周裴俠為户部中大夫時有姦吏主守倉儲積年隱沒至千萬者及俠在官勵精擲發旬日之閒姦盜略盡轉工部中大夫有大司空掌錢物典悲泣按北史作掌錢典李貴乃於府中悲泣或問其故對曰所掌錢物多有費用裴公清嚴懼遭罪責俠聞之許其自首出北史本傳舊集不載按彼未知懼也俠則治之此已知懼也俠則宥之其治之者可以為嚴矣其宥之者可以為明矣明者無他灼見物情也趙煚隋趙煚為冀州刺史嘗有人盜煚田中蒿為吏所執煚曰此乃刺史不能宣風化彼何罪也慰諭遣之令人載蒿一車賜盜者愧耻過於重刑見北史本傳舊集不載按嚴明者不必厲威刑也察見物情中其忌諱有過於市朝之撻者煚載蒿賜盜蓋以此耳不然則彼將玩侮尚何愧耻哉王鍔蕭嶷附唐王鍔為淮南節度使有遺匿名書於前者左右取以授鍔鍔納之鞾中先有他書以雜之吏退鍔探取他書焚之人信其匿名書亦焚也既歸而省所告異日以他微事連所告者禁繫按驗以譎其衆下吏以為神明出唐書本傳舊集不載按南齊豫章王嶷不樂聞人過失左右投書相告置鞾中竟不視取焚之鍔蓋樂聞人過失者則其譎也不若嶷之正也昔朱慱每遷徙易官所到輒出竒譎以明示下為不可欺者鍔豈慕其為人歟張希崇晋張希崇鎮邠州按張希崇鎮邠寧在後唐明宗時書中作晋當作後唐為是有民與郭氏為義子自孩提以至成人後因戾不受訓遣之郭氏夫婦相繼俱死有嫡子已長郭氏諸親教義子訟云是真子欲分其財前後數政不能决希崇判曰父在己離母死不至雖云假子辜二十年養育之恩儻是親兒犯三千條悖逆之罪甚為傷害名教豈敢理認田園其生涯盡付嫡子所有訟者與其朋黨委法官以律定刑聞者皆服其斷舊不著出處按唐制選人試判三條辭理愜當决斷明白乃為合格謂之拔萃希崇之判蓋本於此惟其愜當明白是故聞者皆服也張齊賢王延禧附張齊賢丞相在中書時戚里有爭分財不均者更相訴訟又因入官自理於上前更十餘斷不服齊賢曰此非臺省所能决也臣請自治之上既許乃坐相府召訟者問曰汝非以彼所分財少乎皆曰然即命各供狀結實且遣兩吏趣徙其家令甲家入乙舍乙家入甲舍貨財皆安堵如故文書則交易之訟者乃止明日奏狀上大悅曰朕固知非卿莫能定也出司馬光丞相涑水紀聞按曾肇內翰撰王延禧朝議墓志云延禧任嶽州沅江令時有兄弟分財者弟弱所得田下訴不均詰其兄曰均矣即令二人以所得更取之兄訴於州州守笑曰此張詠尚書斷獄法也豈彼所聞異乎燕肅鞠真卿附燕肅侍郎知明州俗悍輕喜鬭肅推先毆者雖無傷必加以罪後毆者非折跌支體皆貸之於是鬭者為息見本傳按民之鬭毆傷有輕重理有曲直不治其傷而治其理者乃息鬭之術也若折跌支體則理雖直而傷已甚斯不可貸矣譬猶鬭殺用刃以故殺論蓋其情重也沈括內翰說鞠真卿知潤州時民有鬭毆者本罪之外别令先下手者出錢以與後應者小人靳財兼不甘輸錢於敵人終日分爭相視無敢先下手者蓋無賴之民不畏杖責故設此事以折伏之與王敬則治偷之術同也見筆談近時州縣間固有使民輸下拳錢者然官自取之則不足以懲惡而適所以招怨斯失其本矣豈若不治其傷而治其理之簡易乎韓琚鄧思賢附韓琚司封嘗通判䖍州其民善訟或僞作寃狀悲憤呌呼似若可信者㑹守缺琚行郡事究其風俗考其枉直下莫能欺辭伏者自以為不寃終於兩浙轉運使魏公琦之兄也見尹洙龍圖所撰墓銘按沈括內翰說江西人好訟有一書名鄧思賢皆訟牒法也其始則教以侮文侮文不可得則欺誣以取之欺誣不可得則求其罪以劫之鄧思賢人名也始傳此術遂名其書村校中往往以授生徒見筆談然則琚所以究其風俗考其枉直者豈特下莫能欺蓋亦人不可劫不可劫所以為嚴也莫能欺所以為明也彼其辭伏者自以為不寃非此故歟葛源葛源郎中初以吉州太和簿攝吉水令他日令始至猾吏誘民數百訟庭下設變詐以動令如此數日令厭事則事常在吏矣源至立訟者兩廡下取其狀視有如吏所為者使自書所訴不能書者吏受之往往不能如狀窮輒曰我不知為此乃某吏教我所為也悉捕劾致之法訟以故少吏亦終不得其意見王安石丞相所撰墓志按為政者茍欲戢吏唯嚴明可夫民雖好訟也若非吏與交通亦焉能獨為欺誣劫持之計耶吏不得其意則民訟宜少矣源使民自書所訴不能書者吏受之乃鞫民情核吏姦之術也彼既姦猾自當畏戢操術如此不亦可乎劉敞劉敞侍讀知永興軍時大姓范偉冒武功令祚為祖穿祚墓以己祖母祔之規避徭役者五十年數犯法至徒流輒以贖免長安人共患苦之然吏莫敢治敞按其事獄未具而召由是辭屢變證逮數百人獄連年不决詔取付御史臺驗治卒如敞所發見本傳按范偉之橫人患苦之然敞按其冒䕃避役證逮數百人連年不决者何也彼於黨與結之厚矣乃敢爾也證逮之人其黨與也豈易鞫哉且長安人共患苦之然吏莫敢治則桀黠可知也非按者嚴明不能發其事非鞫者嚴明不能得其實是故姦民多幸免也獄辭屢變蓋以此歟許元劉晏附許元待制初為發運判官患官舟多虛破釘鞠之數蓋以陷於木中不可稱盤故得為姦元首至船場命拽新造舟縱火焚之火過取其釘鞠稱之按劉熙釋名鉸鏑也關西謂之釘鉸此文釘鞠無出或即釘鉸聲之訛耳比所破才十分之一自是立為定額見魏泰東軒筆録按元不治虛破之罪而但立為定額可也然亦異乎劉晏矣蘇軾尚書說晏江淮發運使時於揚州造船每隻載米一千石破錢一千貫而實費不及五百貫或譏其枉費晏曰大國不可以小道理凡所創制須謀經久船場執事者非一有餘剩衣食可以養活衆人則私用不窘而官物牢固由是船場人皆富贍五十餘年饋運不闕至咸通末有吳堯卿者始勘驗每船合用物料實數估給其值無復寬剩而船場自此破壞饋運自此闕絶晏言大國不可以小道理良可信也見奏議元定釘鞠額無乃類吳堯卿乎雖幸而不至敗事然其嚴明乃俗士所誇君子所鄙不可為後世法也張式張式郎中初為南劒州將樂縣主簿有銀冶坐嵗課不足繫者常數十百人式籍其人使富貧財力相兼課遂有羡人無繫者見王安石丞相所撰墓志按式知銀冶嵗課所以不足蓋緣冶户或有財而無力或有力而無財於是籍其人使富貧財力相兼則富者不患力乏貧者不患財窘課遂有羡理宜然也昔之繫者常數十百人今則人無繫者矣嚴明之政不當如是乎孫甫孫甫待制為華州觀察推官時州倉粟惡吏當負錢數百萬轉運使李紘以吏屬甫乃令取斗粟舂之可棄者十才一二又試之亦然吏遂得弛負錢數十萬而已紘因薦之見曾鞏舍人所撰行狀按嚴明者非若世俗以苛為嚴以刻為明也持循事理照察物情之謂也以事理言之則倉粟雖惡不應盡可棄也以物情言之則負錢數百萬將何以償耶甫取斗粟舂之可棄者十才一二但負錢十萬而已吏既得弛重負官亦獲保舊積是持循照察之效也可不謂之嚴明乎周沆本傳鹽價一事附周沆侍郎嘗為河東轉運使自慶厯以來河東行鐵錢民多盜鑄吏以峻法繩之扺罪者日繁終不能禁沆乃命高估鐡價盜鑄者無利不禁自息見司馬光丞相所撰神道碑按沆知慶州時邉民多䦨出塞販青鹽沆請損官鹽之價犯者稍衰見本傳夫或髙鐡估或損鹽價法異而意同皆治其本也治其末者雖繩以峻法而終不能禁徒為苛刻耳治其本者雖處以平法而姦盜自止豈非嚴明乎茍欲嚴行政理要惟明見事情然後政不苛暴事不刻核而獄訟省矣彼籍冶而課羡舂粟而負少者亦猶是也王罕王罕大卿知潭州民有與其族人爭産者辨而復訴前後十餘年罕一日悉召立庭下謂曰諸家皆里富人無乃厭追逮之苦今無狀子寒饑不能以自存况析産之劵有不明以故久不决人能少資之令其逺去後復何患乎皆泣聼罕命自言方對吏時雖欲求為此顧不可得於是遷所訴者於旁州獄訟為之衰止見王圭丞相所撰墓志按嚴明之術在於察見物情裁處事體彼爭産者困於寒饑析産者苦於追逮理之曲直何足深校茍或可已無不聽命於是人少資之令其逺去則析産者所損不多而免追逮之苦爭産者所獲不少而脫寒饑之困州民獄訟亦為衰止豈非能察見而善裁處乎儻忿其辨訴加以峻罰則物情不無所傷而事體亦有所害稱為嚴明斯失之矣若君子則雖昭然深察毅然决行而從容中理無傷害也豈非嚴明之懿者乎矜謹袁安後漢袁安為河南尹政號嚴明然未曾以贓罪鞫人常稱曰凡學仕者髙則望宰相下則希牧守錮人於聖世尹所不忍為也聞者皆感激自勵在職十年京師肅然出後漢書本傳舊集不載按安之政號嚴明必不容姦矣其未嘗以贓罪鞫人蓋疾夫案吏者務為深刻文致於贓也若彼贓狀自露非我鞫而出之雖繩以法亦何憾焉司馬芝魏司馬芝為大理正有盜官練置厠中者吏疑女工遂收付獄芝曰刑戮之失在於苛暴今先得贓物後訊其辭若不勝楚掠或至誣服豈可折獄且簡而易從大人之化也不失有罪庸世之治耳今宥所疑以隆易從之化不亦可乎太祖從其議舊出魏志本傳王坦之晋王坦之襲封藍田縣侯時卒士韓悵逃亡歸首云失牛故叛有司劾悵偷牛考掠服罪坦之以為悵束身自歸而法外加罪懈怠失牛事或可恕加之木石理有自誣宜附罪疑從輕之例遂以見原出晉書王湛傳坦之其曾孫也舊集不載按訊盜練劾偷牛皆慮自誣而遂見宥合矜謹之義矣蕭子良任昉彈事附南齊竟陵王子良為㑹稽太守時山隂人孔平詣子良訟嫂市米負錢不還子良歎曰昔高文通與寡嫂訟田義異於此乃賜米錢以償之出南史本傳舊集不載按梁御史中丞任昉彈中軍參軍劉整因兄寅苐二息師利按原本作第一庶息今據任昉本集改正往整田上經十二日整便責寡嫂范米六斗哺食米未展送忽至户前攘拳大罵突進屋中屏風上取車帷凖米去亦引髙鳯事為彈文蓋鳯隱者也太守連召恐不得免自言本巫家不應為吏又詐與寡嫂訟田遂不仕若整與平意實忘義固異於此然昉請免整收治其罪而子良但賜米錢以償之不治平罪何也責士之法不以責民是亦所以為矜謹也陸襄梁陸襄為鄱陽內史時妖賊鮮于琮敗獲之後鄰郡豫章安成等守宰案其黨與因求貨賄皆不得實或有善人盡室罹禍唯襄郡境枉直無濫人歌之曰鮮于抄後善惡分人無橫死賴陸君出南史陸慧曉傳襄其從孫也舊集不載按推窮賊黨者茍不矜謹必至枉濫彼使善人盡室罹禍與賊何異哉襄之用心獨異於彼宜其人歌之也宋世軌蘇瓊附北齊宋世軌為廷尉少卿洛州人聚結欲劫河橋吏捕按之連諸元徒黨千七百人崔昻以為反數年不斷及世軌為廷尉判其事為劫唯殺魁首餘從坐悉捨焉出北史宋隱傳世軌其族孫也舊集不載按蘇瓊為三公郎中時頻有告謀反付瓊推檢事多申雪崔昻為尚書謂瓊曰若欲立功名當更思餘理乃數雪反逆身命何輕耶瓊正色曰但雪寃枉不放反逆昻大慙夫崔昻亦善折獄其意如此乃寒伯寄所謂考囚者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百者也且昻於此獄數年不斷豈非求反狀未得乎世軌判為劫事理所當然斯可以無慙於瓊矣是皆矜謹之君子也郎茂陸襄附隋郎茂初授衛州司録有能名尋除衛國令隋諸王置國官有令一人至煬帝時改國令為家令有部人張元預與從父弟思蘭不睦丞尉請加嚴法茂曰元預兄弟本相憎嫉又坐得罪彌益其忿非化人之意也乃遣縣中耆舊更往敦諭道路不絶元預等各生感悔詣縣頓首請罪茂曉之以義遂相親睦稱為友悌出北史郎基傳茂其子也舊集不載按梁陸襄為鄱陽內史有彭李二家先因忿爭遂相誣告襄引入內室不加責誚但和言解諭之二人感恩深自咎悔乃為設酒食令其盡歡酒罷同載而還因相親厚出南史本傳舊集亦不載夫異姓之疏也誣告之怨也猶可和解使相親厚况親族之不睦者乎彼猶未容責誚此可遽加嚴法乎矜謹之士宜鍳於兹故並著焉張詠王質附張詠尚書再知益州民有負販者翁役其婦婦違之翁怒剪其髮曰我作婢使汝其子自外歸作閙所由具事領過或謂其子曰翁剪婦髮何罪子若執父汝罪不輕至廳下詠詰之翁云婦自剪髮泥某子亦云妻自剪髮泥翁詠察其誑即於解狀後判云雖然子為父隱其奈執辭不定既不可窮詰於尊長又不可抑斷於卑幼仰責新婦狀今後再不侍養别具狀領過並放詠謂掾屬曰五服之內卑幼條至重親民之官所宜盡心見李畋虞部所撰忠定公語録按王質待制知荆南有媪訴其婦薄於養婦言舅亡姑嫁既窮而歸且奉事無不謹質曰姑雖不良獨不顧夫耶因取家人衣以衣媪又給以廩粟使歸養之皆感泣而去見本傳此其翁姑理皆不直然家人之義當責卑幼但不可遽繩以法耳是故恕其罪而責之養也薛奎仇覽韋景駿二事附薛奎參政知益州有婦人訟其子不孝詰之乃曰貧無以養奎因出俸錢與為資業而遣之見本傳按後漢仇覽為蒲亭長有陳元者獨與母居而母訟元不孝覽驚曰吾近過元舍廬落整頓耕耘以時此非惡人當是教化未及耳母守寡養孤苦身投老奈何肆忿一朝欲致子以不義乎母感悟涕泣而去覽乃親到元家與其母子飲因為陳人倫孝行譬以禍福之言元卒成孝子見後漢書本傳唐韋景駿為貴鄉令有母子相訟者景駿曰令少不天常自痛爾幸有親而忘孝耶教之不孚令之罪也因嗚咽流涕付授孝經使習大義於是母子感悟請自新遂為孝子見唐書本傳此皆與奎出俸錢為資業之意同矣茍繩以法子罪不輕令律所謂可從而違堪供而闕者是也得不謂之矜謹乎任布任布副樞知越州民有被酒罵其祖者祖既訴之已而大悔哭於庭曰老無子賴孫以為命布特貸出之且上書自劾朝廷亦不之問見本傳按孫罵祖法當死特貸出之理宜自劾此乃矜其失教而謹於用刑者也蘇渙蘇渙郎中知鄢陵縣時嵗荒盜起有兄殺弟而取其衣者弟偶不死與父偕往訴之渙閔其窮而為姦問之曰汝殺而弟知其不死而捨之者何兄諭其意曰適有見者不敢再也由是得不死父子皆感泣及渙罷去負任從之數千里見蘇轍門下所撰墓表按古之聽獄者求所以生之不得其所以生之者乃刑殺焉孫罵祖有可生之理以其被酒且祖自悔也兄殺弟有可生之理以其苦饑且弟不死也布之貸出其孫渙之慮問其兄皆得其所以生之者也可無愧於古人矣李士衡高化附李士衡觀察初釋褐為京兆鄠縣主簿府知其才俾權獄掾咸陽縣有民殺人具獄以送府父子五人其為從者皆服加功之罪士衡告於尹曰彼殺人者止一人耳餘四人掩其骸可坐以加功置之重辟乎尹喜從其議曰四人者非子之明則寃於地下矣見范仲淹參政所撰神道碑按以掩骸為加功是深文也罪不應死而文致之何其忍哉嘗聞用法殺人無異用創殺人深文之罪縱或幸免鬼得而誅之也髙化太尉雖起行伍頗知民事晚守相州部有大獄皆當論死化疑之命移他獄訊䝉活者三人殆亦以掩骸為加功之類歟此矜謹者所宜盡心也王博文王博文副樞知密州時負海有濤落鹽場嵗歉民多盜鬻吏捕逐之輒起捍鬭皆坐法當死博文上言請權弛鹽禁俟嵗豐如舊從之見本傳按周禮荒政十有二其曰緩刑曰舍禁曰去幾者博文所請義與合焉茍非通逹古今豈能矜謹如是耶王質王質待制嘗通判蘇州以病在告知州黃宗旦來省問因言獄有盜鑄錢者百餘人吾隂以術鈎得之質曰弋不射宿惡隂中於物也今殺數人而徒流者又數十人公隂中之也宗旦瞿然為貸其死罪而餘悉輕出之見本傳陳執方李士衡附陳執方大卿通判江州時民饑有刈人之禾而傷其主法當死者執方以為古之荒政所以恤人者盡矣然尚緩刑况於今哉即奏貸其死見王安石丞相所撰墓志按李士衡觀察權知天雄軍民有盜瓜傷主者法當死士衡以嵗饑奏貸之自是著為例執方之奏蓋用此例也見本傳陳巽陳巽賔客初為常州團練推官盜有棄財走者巽以為不應死通判不肯用其言巽力爭而讞之盜卒得不死見曾鞏舍人所撰神道碑按盜非傷主計贓為罪棄財走者豈復應死通判不肯用其言必持深刻之說故失矜謹之義也胡向胡向少卿為袁州司理參軍時有盜七人皆當死向疑其有寃乃留訊之則二人者果不同謀始受其傭而中道被脅以行卒得免死見吕大防丞相所撰墓志按捕獲盜者七人乃合格故以被脅為同謀蓋希賞爾斯不仁哉宜其留訊而卒免之也張奎王濟附張奎密學初為常州推官轉運使舉監衢州酒稅婺州有滯囚法當死獄成三問輒不服命奎覆案一視牘而辨之得不死人皆服按奎一視牘而辨之者謂辨其情理也人有迹狀重而本情輕者昔既酌情而立法今當原情以定罪安得不辨情理而抵之死耶此其精明固能服人至於審謹尤可傳世王濟郎中為澶州司理掾時州獄有重囚臨刑稱寃濟覆按之亦得不死與此類矣豈非哀矜折獄而然歟二事並見本傳李允元袁安附李允元給事通判寧州時州卒謀亂事發連逮者衆允元極意辨析止坐首惡數人誅之見本傳按後漢袁安舉能理劇拜楚郡太守時楚王英謀為逆事下郡考核辭所連及繫者數千人顯宗怒甚吏案之急迫痛自誣死者甚衆安到郡不入府先往按獄理其無明驗者條上出之府丞掾吏皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即報許得出者四百餘家允元殆有袁安之心歟事在州郡辨析固易然其矜謹亦可嘉也李應言榮諲吳育二事附李應言諫議為侍御史時鄆州民傳妖法者其黨與凡百餘人捕者欲邀功賞而誣以不軌命應言往按其事止誅首謀數人餘悉全活之按榮諲大監為開封府判官時太康縣捕民數十人事浮屠法相聚祈禳名白衣㑹知府賈黯疑其有妖請殺為首者餘悉流之諲以為本無妖黯具奏并諲議奏之朝廷以諲議為是乃流其首餘皆杖之蓋鄆州之民傳妖法無不軌事太康之民浮屠法本無妖故重輕之差如此若非矜謹則或以為不軌而盡誅其黨或以為有妖而特殺其首不無枉濫矣吳育參政知蔡州時京師歡言有妖人數千在州界詔遣中使名捕者十人至則請以巡檢兵趨確山索之育謂曰使者欲得妖人還報耶請留勿往此鄉民依浮屠法相聚耳可走一介召之立至今以兵往人心驚疑奈何中使以為然召之果至械送闕下皆以無罪得釋而告者遂伏辜此又矜謹之大者也夫太康所捕有罪而蔡州所送無罪何也事浮屠法相聚祈禳名白衣㑹法所禁也依浮屠法相聚無祈禳事非白衣㑹法所不禁也茍非矜謹之至豈能不濫如此哉三事並見本傳王琪王琪侍郎知復州民有毆佃客死者吏將論如法忽夢有人持牒叩庭下曰某事未可遽以死論也琪疑之因留獄未决有司曰無足疑者琪曰第留之後十餘日果有新制下凡主人毆佃客死聽以减死論吏民莫不神服見王圭丞相所撰墓志按此非思慮所及蓋平時矜謹故感於夢寐記曰至誠之道可以前知其此之謂歟王延禧王延禧朝議初為嶽州沅江令嵗饑盜起親獲十餘人贓皆應死法得遷官延禧歎曰是皆良民窮而為盜令既無以業之又利其死以為己功亦何忍哉諭被盜者悉裁其贓盜得不死延禧王黃州孫也見曾肇內翰所撰墓志按周禮荒政曰除盜賊謂饑饉盜賊多不可以不除也延禧親獲十餘人蓋以此耳邀功希賞非其本心故諭被盜者悉裁其贓使得不死夫捕盜之官利盜之死譬猶矢人惟恐不傷人其術使之然也雖遷一官而殺數人榮不足言愧何可勝君子豈忍為是哉若殘民害物罪不可赦非窮而為盜計贓抵死者則其獲賊受賞義在懲勸君子可以無憾也延禧所捕實與此異故竊歎云爾折獄龜鑑終於矜謹惻隱之心人皆有之為物所遷斯失之矣故有利人之死為己之功者或文致於大辟或誣入於極典寧復能存不忍之心以貸應死之命乎故著此事矜謹篇末庶幾覽者有所警焉折獄龜鑑卷八觀易之象雷電皆至豐而曰君子以折獄致刑山下有火賁而曰君子以明庶政無敢折獄蓋獄者民之命折獄者貴乎明而尤不敢輕用其明龜鑑有書所以推廣其明而示人以謹重之意也宜春郡齊舊有折獄龜鑑嵗久字畫漫漶覽者病之余叨守既數月獄訟簡清公暇出篋中所藏一編參訂遴匠重刋俾覽者充拓聞見如龜决疑如鑑燭物是亦惟良折獄之一助云景定辛酉四月上浣天台趙時槖謹書
