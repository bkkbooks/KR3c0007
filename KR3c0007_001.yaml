body:
  text: 折獄龜鑑卷一宋鄭克撰釋寃上孫登呉太子孫登嘗乘馬出有彈圓按吳志圓作凡蓋二字古通用過左右求之適見一人操彈佩圎咸以為是辭對不服從者欲捶之登不聽使求過圓比之非類乃見釋舊出呉志本傳按人之負寃多因疑似聽者不能審謹忿然作威遂至枉濫此事雖小可以喻大故首著焉曹攄于公孟嘗二事附案此一章原本軼去事實人軼去附録中于公一節今補入晉曹攄為臨淄令縣有寡婦養姑甚謹姑以其年少勸令改適婦守節不移姑愍之宻自殺親黨告婦殺姑官為考鞫婦不勝苦楚乃自誣獄當决適值攄到知其有寃更加辯究具得情實時稱其眀出晉書本傳前漢于公為縣獄史郡决曹决獄平東海有孝婦少寡亡子養姑甚謹姑欲嫁之終不肯其後姑自經死姑女告吏婦殺我母吏捕孝婦孝婦辭不殺姑吏驗治孝婦自誣服具獄上府于公以為此婦養姑十餘年以孝聞必不殺也太守不聽于公爭之弗能得乃抱其具獄哭于府上因辭疾去太守竟論殺孝婦郡中枯旱三年後太守至卜筮其故于公曰孝婦不當死前太守彊斷之咎儻在是乎於是太守殺牛自祭孝婦冡因表其墓天立大雨嵗熟郡中以此大敬重于公出前漢書于定國傳于公乃定國父也後漢上虞有寡婦養姑至孝姑以夀終而夫女弟先懐嫌恨乃誣婦厭苦供養加酖其母官吏不察户曹史孟嘗言於太守亦不為理遂以寃死郡中連旱二年出後漢書本𫝊此兩事舊集並不載臨淄寡婦若不遇曹攄則與東海上虞無以異矣惟鑒彼負寃之可戒乃顯此釋寃之足尚故附著之苻融前秦苻融為司隸校尉京兆人董豐㳺學三年而反過宿妻家是夜妻為賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠誣引殺妻融察而疑之問曰汝行徃還頗有怪異及卜筮否豐曰初將發夜夢乘馬南渡水返而北渡復自北而南馬停水中鞭之不去俯而視之見兩日在于水下馬左白而濕右黒燥寤而心悸竊以為不祥還之夜夢如初問之筮者云憂獄訟逺三枕避三沐既至妻為具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕枕而寢融曰吾知之矣周易坎為水離為馬夢乘馬南渡旋北而南者從坎之離三爻同變變而成離離為中女坎為中男兩日二夫之象坎為執法吏吏詰其夫婦人被流血而死坎二隂一陽離二陽一隂相承易位離下坎上既濟文王過之囚羑里有禮而生無禮而死馬左而濕濕水也左水右馬馮字也兩日昌字也其馮昌殺之乎於是推撿獲昌而詰之昌具首服曰本與其妻謀殺董豐期以新沐枕枕為驗是以誤中婦人舊出晉載記本傳占夢辭煩删取其要按古之察獄亦多術矣卜筮怪異皆盡心焉至誠哀矜必獲㝠助是以馮昌之罪具服而董豐之寃得釋也馮之馬邉非水乃仌也昌之日下非日乃曰也苻融以意言其事遂驗此周宣所謂神靈動君使言者也豈非至誠哀矜而然歟占夢事又見察賊門案此第三章原本軼去標題今補入辛祥法䧺魏丕趙德彞薛奎唐肅杜衍孫沔姚仲孫程坦孫㢘靳宗說劉緯宋昌言凡一十三事附後漢辛祥為并州平北府司馬有白壁還兵藥道顯被誣為賊官屬咸疑之祥曰道顯靣有悲色察獄以色其此之謂乎苦執申之月餘别獲真賊祥終於安定王爕征虜府長史出北史辛紹先傳祥其孫也舊集不載按後漢法䧺為青州刺史每行部錄囚徒察其顔色多得情偽盖察獄之術有三曰色曰辭曰情此其以色察之者也若辭與情頗有寃枉而迹其狀稍渉疑似豈可遽以為實哉苦執申之理亦應爾後十二事是也故附見之云魏丕初從周世宗鎮澶淵奏授司法參軍時有强盗五人獄具將伏法丕疑其寃因緩刑而察之不數日本盗就擒五人獲免後事本朝終於左驍衛將軍信都郡王徳彞雍熙中判沂州儒生乙恕郊居肄業一旦有横尸在舍側邏者見之捕恕送官獄具將伏法徳彝疑其寃命别司鞫問亦如之因令緩刑以俟未㡬果獲賊恕乃得釋薛奎參政為隰州軍事推官時有民常聚愽僧舍一日盗殺寺奴取財去而博者四人適至啟户濺血汙衣遽驚走邏者因捕送官考訊引伏奎獨疑之請緩其獄後數日果得殺人者唐肅待制為秦州司理參軍時有商人夜宿逆旅而同宿者殺人亾去旦起視之血汙其衣為吏所執不能辨眀遂自誣服肅為白其寃而知州馬知節趣令具獄肅固持不可後數日得真殺人者就辟本州觀察推官杜衍丞相作河東提刑時上黨民有繼母為人所殺或告民殺之不勝楚掠遂自誣服獄既具衍疑非實未論决間果得真殺人者已上六事並見本傳孫沔副樞為趙州司理参軍時盗發屬縣為捕者所廹乃棄其刀并所盗贜於氏家後即其家得㑹飲者十六人適如其數捕繋縣獄掠使服罪法皆當死以具獄上沔疑其枉而留訊之州將怒然終不敢决未㡬得真盗州將反喜謂沔曰微子吾得自脫耶見王珪丞相所撰墓誌凡本朝公卿事唯載於國史本傳者稱名若墓誌行狀雜書小說所載則或稱爵或稱字此皆以名書之庶得古今一體且臨以紹興恤刑手詔則於禮亦當書名也姚仲孫龍學為許州司理㕘軍時民有被盜殺者其妻言里胥嘗責賄于夫不與而怨之此必盜也乃捕繋獄將傅以死而仲孫疑之知州王嗣宗曰若保非盜耶然亦不敢遽决後數日果得真盗嗣宗復喜曰察獄當如是也改資州轉運使檄徃富順監按疑獄全活者數十人程坦國愽為郢州司户㕘軍時民有執盜者三人法當死州趣獄上坦疑其自誣輙留更訊之後果得真盗自是雖他州疑獄監司必屬坦平决子戡為宣徽南院使贈太師見王珪丞相所撰墓誌孫㢘觀察初隸親事官後以慈州刺史知滄州有劫盗獄既成廉疑之謂僚屬曰我武人也獄辭固非吾事然試召某隣里詢其行止皆曰此平日跅􅕟不事今以為盗則非也後數日果得真盗降詔奬諭靳宗說館使初以䕃補三班奉職監滄州鹽山務嘗攝縣事有繋囚坐殺人法當死者宗說疑之㑹囚言母年九十病且言願得一别母而死宗說惻然釋縛令人與俱至其家既而更獲真殺人者劉緯大卿知邢州屬邑有卒死于林中捕盜者從旁得一人俾償死緯疑不實眀日得死卒戍所移文乃二人共竄亟令追獲其一同竄者考之果服宋昌言大監知澤州時有大辟獄具昌言疑其寃持之不决果獲真盗已上四事並見本𫝊右十二事皆以其辭與情察之者也若靳宗說釋死囚縛使别其母非知其寃而然也但以囚有念母之心而憫之耳寃狀卒眀出于邂逅是亦至誠哀矜之效也其餘審謹不敢遽决亦因詳緩每獲辨釋盖寧可淹繋以求其實毋或濫刑以䧟於寃庶協舜典欽恤之義也易曰中孚君子以議獄緩死此之謂歟李崇李崇為河東太守有定州流人解慶賓兄弟坐事俱徙揚州弟思安背役亾歸慶賓懼後役追責規絶名貫乃認城外死尸詐稱其弟為人所殺迎歸殯𦵏頗類思安見者莫辨又有女巫陽氏自云見鬼說思安被害之苦饑渇之意慶賓又誣同軍兵蘓顯甫李蓋等所殺詣州訟之二人不勝楚毒各自款引獄將决竟崇疑而停之宻遣二人非州内所識者偽從外來詣慶賓告曰僕住在北州去此三百按晉書本傳無去此三百四字比有一人見過寄宿夜中共語疑其有異便即詰問迹其由緒按晉書本傳無迹其由緒四字乃云是流兵背役逃走按晉書本傳無此二字姓解字思安時欲送官苦見求及稱有兄慶賓今住揚州相國城内嫂姓徐君脫矜愍為徃報告見申委曲家兄聞之必重相報所有資財當不愛惜按晉書無所有資財當不愛惜八字今但見質若徃不獲送官何晚是故相造指申此意君欲見顧㡬何當放賢弟若其不信可見隨㸔之慶賓悵然失色求其少停當備財物此人具以告崇崇攝慶賓問曰爾弟逃亾何故妄認他尸慶賓伏引更問蓋等乃云自誣數日之間思安亦為人縛送崇召女巫視之鞭笞一百崇斷獄精審皆此類也按此章標題秪載李崇一事原夲此下人載栁慶二事於體例不合考栁慶前一事見後苐九章後一事見後譎賊門此蓋誤載今刪去按此亦察其靣之色款之辭事之情而疑其誣服者也但用譎鈎慝以驗誣告為異耳然所以紿而驗之者欲釋誣服之寃也故列于此焉紿兵事又見辨誣門質弟事又見鈎慝門鞭巫事又見懲惡門司馬恱後魏司馬恱為豫州刺史有上蔡董毛奴齎錢五千死於道路或疑張堤行劫又於堤家得錢五千堤懼楚掠自誣言殺恱疑不實引毛奴兄靈之問曰殺人取錢當時狼狽應有所遺曽得何物答曰得一刀鞘恱取刀鞘視之曰此非里巷所為也乃召州内刀匠示之有郭門者言此刀鞘其手所作去嵗賣與鄰人董及祖恱收及祖詰之具服靈之又于及祖身上認得毛奴所服皂襦遂釋張堤出北史司馬楚之𫝊恱其孫也舊集不載按恱所以能使及祖服罪者雖有智算亦偶然耳向若賊不遺刀鞘或鞘非州内刀匠所作何從知及祖為賊耶其可稱者哀矜審謹合于中孚議獄緩死之義故卒能獲賊以釋寃也認鞘事又見迹賊門宋世良後魏宋世良為清河太守時陽平郡移掩劫盗三十餘人世良訊其情狀惟送十二人餘皆放之陽平太守怒曰輙放吾賊及推問送者皆實放者皆非始歎服焉出北史宋隱𫝊世良其族曽孫也舊集不載按他郡移掩劫盜雖或誣引咎不在我據名縛送斯亦可矣世良乃復訊其情狀實者送之非者放之是哀矜審謹之至也傳言齊天保初大赦世良郡無一囚率羣吏拜詔而已此其效歟蘇瓊北齊蘇瓊為文襄儀同府刑獄參軍并州嘗有强盗推其事者所疑賊徒並已考伏失物家亦識認惟不獲盗贓付瓊窮審乃别推得元景融等十餘人并獲贓驗文襄語前妄引者曰爾軰不遇我好參軍㡬致枉死出北史本傳舊集不載按瓊推盗之術固有可稱然君子所貴者不在覈姦而在釋寃也栁慶後周栁慶初仕後魏為雍州别駕有賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊詣縣訊問主人遂自誣服慶聞而疑之乃召問賈人曰卿鑰常置何處對曰常自帶之慶曰頗與人同宿乎曰無曰人同飲乎曰向者曽與一沙門再度酣宴醉而晝寢慶曰主人特以痛自誣非盜也彼沙門乃真盗耳即遣吏逮捕沙門乃懐金逃匿後捕得盡獲所失之金舊出北史栁虬傳慶其弟也按緘閉不異而失其金則盗非逺故疑主人慶察其色其辭其情而知主人誣服矣故問其管鑰所在同宿同飲者誰沙門無故與賈酣宴不一而止果何意哉此必伺隙為盗也醉而晝寢彼乃得便其金於是失之沙門非盗而何慶之眀察亦可稱矣用以釋寃尤為羙也問飲事又見迹盗門韋鼎蕭懐武附隋韋鼎為光州刺史有人客遊通主家妾及其還去妾盗珍物於夜逃亡㝷于草中為人所殺主家知客與妾通因告客殺之縣司鞫問具得姦狀因斷客死獄成上州鼎覽之曰此客實姦而不殺也乃某寺僧紿妾盗物令奴殺之贜在某處即放此客遣人掩僧并獲贓物自是部内肅然道無拾遺出南史韋叡傳鼎其孫也舊集不載按鼎所以知者能廣耳目以察姦慝也茍不如是則無以釋疑似之寃矣夫治民之有耳目也猶用兵之有間諜也兵法云非聖智不能用間非微宻者不能得間之實廣耳目察姦慝亦猶是也不然則所使察姦慝者或反為姦慝矣王蜀時有蕭懐武主尋事團乃軍廵之職也所管百餘人每人各養私名十餘軰或聚或散人莫能别呼之曰狗深坊曲巷馬毉酒保乞丐傭作販賣童兒皆有其徒民間偶語無不知者或在州郡及勲貴家掌庖㸔廐御車執樂公私動靜即時聞達於是人心恐懼自疑肘腋悉其狗也懐武殺人不可勝數寃枉之聲滿于内外郭崇韜入蜀乃族誅之見成都古今記是使察姦慝而反為姦慝者也豈能資耳目之用釋疑似之寃乎鼎異於此故可稱也蔣常韓思彦附唐貞觀中衛州版橋店主張逖妻歸寧有魏州三衛楊正等三人投店宿五更早發是夜有人取其刀殺逖却納鞘中正等不覺至曉店人追及刀血狼籍收禁考掠遂自誣服太宗疑之差御史蔣常覆推常至追店人十五以上皆集人數不足因俱放散獨留一嫗年八十餘晚乃令出宻遣獄典覘之曰有人共語即記姓名果有一人問嫗使人作何推勘前後三日並是此人捕獲詰問具服與逖妻姦殺逖有實迹正等乃釋舊不著出處當是唐人小說所載今亾本耳餘類此者同按李崇用譎鈎慝蔣常用譎察賊而皆能釋寃斯無惡於譎也留嫗事又見譎賊門唐韓思彦使并州有賊殺人主名不立醉者懐刀血汚訊掠已服思彦疑之晨集童兒數百暮出之如是者三因問兒出亦有問者乎皆曰有之乃物色追訊遂擒真盗見唐書本傳按此亦用譎獲賊而寃乃釋但不若常獨留一嫗宻覘問者為精審耳故特附見之也裴懷古唐裴懷古為監察御史時真定有浮屠按新唐書本傳作恒州浮屠為其徒誣告祝詛不道武后怒命按誅之懷古得其枉為后申析不聽懐古因曰陛下法與天下畫一豈使臣殺無辜以希盛㫖哉即其人有不臣狀臣何情寛之后意解得不誅見唐書本傳舊集不載按懷古當酷吏深文之時獨能申析誣枉抗辭執法始終不撓其徐有功之流亞歟李元素唐李元素為御史時東都留守杜亞惡大將令狐運會盜劫輸絹於洛北運適與其下畋近郊亞疑而訊之幕府按鞫無狀更以愛將武金掠服之詔監察御史楊寧覆驗事皆不讐亞劾寧㒺上寧抵罪傅致周内之若不可翻者徳宗信不疑詔元素與刑部員外郎崔從質大司理直盧士瞻馳按之亞迎以獄告元素徐察其寃悉縱所囚以還亞大驚復劾元素失有罪比元素還帝已怒奏獄未畢帝曰出元素曰臣言有所未盡帝曰苐去元素曰臣以御史按獄知寃不得盡辭是無容復見陛下帝意解即道運寃狀帝感悟曰非卿孰能辨之然運猶以擅捕人得罪流歸州武金流建州後嵗餘齊抗得真盗繇是天下重之遷給事中出唐書本傳按運之寃初按鞫無狀後覆驗不讐雖傅致周内之若不可翻者亦非難辨也但帝怒斥令出又云去元素氣不懾辭不撓卒辨其寃而帝亦寤斯為難能耳語曰仁者必有勇此其所以能釋寃也栁渾唐江西觀察使魏少游表栁渾為判官州僧有夜飲火其廬者歸罪瘖奴軍候受財不詰獄具渾與其僚崔祐甫白奴寃少游趣訊僧僧首服因厚謝二人見唐書栁渾傳按僧飲酒失火二罪俱發而謂失火者瘖奴耳且掩其飲酒之迹也若非軍候受財不詰則此獄豈難辨乎唯上下相䝉不以獄事為意故莫之辨耳渾與祐甫一代英賢而白其寃少游能聽用之故趣訊僧云斯亦可稱也袁滋唐李勉鎮鳳翔有屬邑耕夫得馬蹄金一瓮送縣為令者慮公藏主守不謹而寘之私室翌日開視之則皆土塊耳以狀聞府遣掾案之不能自眀誣服換金初云藏之冀壤被人竊去後云投之水中失其所在雖未窮易用之所而皆以為換金無疑府中宴集語及此事咸共嗟歎時袁滋在幕府獨疑其枉勉乃移獄就府俾滋鞫之滋閱瓮間得二百五十餘塊詰其初獲者則二人以巨竹舁至縣乃於列肆索金依塊形狀鎔寫校量始秤其半已及三百斤計其大數非二人以竹擔可舉即是在路之時金已化為土矣令乃獲雪舊出康駢劇談錄按唐書袁滋傳云滋進詹事府司直部官以盜金下獄滋直其寃無鳳翔屬邑事又云滋累從張伯儀何士幹辟無在李勉幕府事康駢所記傳聞失實故非持本末差誤抑又事理乖舛夫六百斤金固非二人竹擔可舉若在路時已化為土則到縣時自當驗實雖色未變而輕重頓異亦易知矣令何故尚慮公藏主守不謹而寘之私室乎乖舛如此無足取者和㠓謂能釋寃載于舊集意則善矣不若唐書本傳為得其實也劉崇龜唐劉崇龜鎮南海有富商子泊船江岸見一髙門中有羙姬殊不避人因戲語之曰夜當詣宅矣亦無難色啟扉待之忽有盗入其室姬即欣然徃就盗謂見擒以刄剚之逃去富商子繼至踐其血洿而仆聞脰血聲未已覺有人卧於地徑走至船夜觧維遁其家蹤跡訟于公府遣人追捕械繫考訊具吐情實唯不招殺人崇龜視所遺刀乃屠刀也因下令曰某日大設闔境屠者皆集毬塲以俟宰殺既而晚放散令各留刀翌日再至乃命以殺人刀換下一口眀日諸人各認本刀一人不去云非某刀問是誰者云某人刀亟徃捕之則已竄矣於是以他囚合死者為商人子侵夜斃之竄者聞而還乃擒寘于法富商子坐夜入人家杖背而已舊不著出處盖亦唐人小說所載今見新唐書劉政會傳後崇龜其七世孫也傳辭太簡故于舊集刪取其要按凡欲釋寃必須有術換刀者迹賊之術也斃囚者譎賊之術也賊若不獲寃何由釋故仁術有在于是者君子亦不可忽也莊遵莊遵初為長安令後遷揚州刺史性眀察嘗有陽陵女子與人殺其夫叔覺來赴賊女子乃以血塗叔因大呼曰柰何欲私於我而殺其兄便即告官官司考掠其叔太過因而自誣其罪遵察之乃謂吏曰叔為大逆速寘于法可放嫂歸宻令人夜中於嫂壁下聽其夜姦者果來問曰刺史眀察見叔寧疑之耶嫂曰不疑因相與大喜吏即擒之送獄叔遂獲免舊不著出處亦不著何代人與蜀莊遵姓名同和氏父子各載一事皆附卷末或疑是唐人然其叙聞哭事言廵行部内駐車聽之則非唐刺史也唐之揚州刺史治廣陵領江都江陽六合海陵髙郵揚子天長七縣而無陽陵漢之揚州刺史治歴陽領九江丹陽廬江㑹稽呉豫章六郡而丹陽郡有陵陽縣豈非陵陽誤為陽陵乎其言陽陵女子豈非王尊傳所謂羙陽女子之類乎以此觀之乃漢人乎但未有眀據不敢决定故且依和氏序唐人後此聊以志疑也克編次已定始見蜀本華陽國志後漢巴郡土人有揚州刺史嚴遵字王思徐州牧嚴羽字子翼羽乃遵之子也父子並著稱云遵在揚州每當遷民遮止之天子就增州秩中二千石居十八年䘚于官則遵果是漢人也勢難移改姑仍舊貫覽者察之按遵之罪叔而放嫂蓋用譎以擿姦也於是既得其情遂擒其人豈非釋寃有術而然歟折獄龜鑑卷一
